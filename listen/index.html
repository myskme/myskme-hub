<!doctype html>
<html lang="zh-CN" data-theme="dark" data-themepref="auto">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<script>(function(){try{var p=localStorage.getItem('myskme-theme')||'auto';var d=p==='auto'?(matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light'):p;var e=document.documentElement;e.setAttribute('data-theme',d);e.setAttribute('data-themepref',p)}catch(e){}})();</script>
<title>听力训练场 · MYSKME × 英语王老师</title>
<meta name="description" content="MYSKME · 中考英语听力训练场：神经网络配音 · 短对话/短文/听词跟读 · 听后答题 · 看原文。">
<meta property="og:type" content="website">
<meta property="og:title" content="听力训练场 · MYSKME 英语王老师">
<meta property="og:description" content="神经配音 · 短对话+短文+跟读 · 听后答题 · 看原文 · 打卡。各设备一致自然。">
<meta property="og:image" content="https://myskme.github.io/myskme-hub/og-cover.png">
<meta property="og:url" content="https://myskme.github.io/myskme-hub/listen/">
<style>
:root{
  --bg:#0a0a0c;--bg2:#111114;--bg3:#16161a;--bg4:#1c1c22;
  --ink:#f0e6d2;--ink2:#a8a090;--ink3:#6a6458;
  --gold:#c9a64a;--gold2:#e8c768;--gold3:#7a6320;--green:#6aa86a;--red:#d56060;--blue:#6ba0dd;
  --line:rgba(201,166,74,.22);--line2:rgba(201,166,74,.09);--glow:0 0 24px rgba(201,166,74,.4);
  --serif:"Noto Serif SC","Source Han Serif SC","Songti SC","STSong",serif;--mono:ui-monospace,Menlo,monospace;
}
:root[data-theme="light"]{
  --bg:#ece2cc;--bg2:#e4d8bc;--bg3:#f8f2e4;--bg4:#e0d3b3;
  --ink:#2a2218;--ink2:#574b37;--ink3:#635943;
  --gold:#6f5410;--gold2:#5f470e;--gold3:#b89a52;--green:#2f6a3e;--red:#9a271d;--blue:#33548c;
  --line:rgba(120,90,20,.30);--line2:rgba(120,90,20,.13);--glow:0 4px 16px rgba(120,90,20,.18);
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--serif);line-height:1.7;
  background-image:radial-gradient(1000px 600px at 50% -10%,rgba(201,166,74,.10),transparent 60%);background-attachment:fixed;
  transition:background-color .35s,color .35s}
:root[data-theme="light"] body{background-image:radial-gradient(1000px 600px at 50% -10%,rgba(190,160,80,.18),transparent 60%)}
.wrap{max-width:680px;margin:0 auto;padding:clamp(28px,6vw,56px) clamp(16px,5vw,32px) 90px}
header{text-align:center;margin-bottom:18px}
.kicker{font-size:12px;letter-spacing:.4em;color:var(--gold);text-transform:uppercase}
h1{font-size:clamp(26px,5vw,42px);font-weight:300;letter-spacing:.14em;margin:.3em 0 .1em}
h1 em{font-style:normal;color:var(--gold);font-weight:500;text-shadow:var(--glow)}
.sub{color:var(--ink2);letter-spacing:.08em;font-size:14px;margin:0}
.streak{display:flex;align-items:center;justify-content:center;gap:14px;margin:14px 0 2px;flex-wrap:wrap;font-size:14px}
.streak .fire{color:var(--gold2)}.streak .prog{color:var(--ink3)}
.dots{display:flex;gap:6px}.dot{width:15px;height:15px;border:1px solid var(--line);border-radius:50%}
.dot.on{background:var(--gold);border-color:var(--gold);box-shadow:var(--glow)}.dot.today{border-color:var(--gold2)}
.item{background:linear-gradient(160deg,var(--bg3),var(--bg2));border:1px solid var(--line);padding:18px 20px;margin-top:16px}
:root[data-theme="light"] .item{background:linear-gradient(160deg,var(--bg3),#f1e9d6)}
.it-top{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:12px}
.it-top h3{margin:0;font-size:16px;font-weight:500}
.kind{font-size:11px;letter-spacing:.1em;color:var(--gold2);border:1px solid var(--gold3);padding:2px 9px;border-radius:999px}
.play{font-family:var(--serif);font-size:15px;letter-spacing:.05em;padding:11px 22px;border:1px solid var(--gold3);color:var(--gold2);
  background:rgba(201,166,74,.08);cursor:pointer;border-radius:3px;transition:all .2s;display:inline-flex;align-items:center;gap:8px}
.play:hover{border-color:var(--gold);box-shadow:var(--glow)}
.play.playing{color:var(--green);border-color:var(--green)}
.now{font-size:12px;color:var(--ink3);margin-left:4px}
.q{margin-top:16px}
.q-stem{font-size:15.5px;margin:0 0 10px}
.ops{display:flex;flex-direction:column;gap:9px}
.op{border:1px solid var(--line);background:var(--bg);padding:12px 16px;font-size:15px;cursor:pointer;text-align:left;border-radius:3px;font-family:var(--serif);color:var(--ink);transition:all .15s}
.op:hover:not(:disabled){border-color:var(--gold);transform:translateY(-1px)}
.op .k{color:var(--gold);margin-right:9px;font-family:var(--mono);font-size:.9em}
.op.correct{border-color:var(--green);background:rgba(106,168,106,.14)}
.op.wrong{border-color:var(--red);background:rgba(213,96,96,.12)}
.op:disabled{cursor:default}
.why{margin-top:10px;padding:11px 14px;border-left:3px solid var(--gold3);background:var(--bg);font-size:14px;color:var(--ink2);display:none}
.why.show{display:block}.why b{color:var(--gold2)}
.script{margin-top:14px;border:1px solid var(--line2);border-radius:4px;padding:0 14px;background:var(--bg)}
.script summary{cursor:pointer;list-style:none;padding:11px 0;font-size:13px;color:var(--gold2);letter-spacing:.06em}
.script summary::-webkit-details-marker{display:none}
.script .line{padding:5px 0;font-size:14px;border-top:1px dashed var(--line2)}
.script .line:first-of-type{border-top:0}
.script .sp{color:var(--gold);font-family:var(--mono);font-size:.85em;margin-right:8px}
.msg{text-align:center;color:var(--ink3);padding:40px 0;letter-spacing:.08em}
footer{margin-top:38px;padding-top:20px;border-top:1px solid var(--line2);text-align:center;color:var(--ink3);font-size:13px}
footer a{color:var(--gold2);text-decoration:none}
.ctrl{position:fixed;right:16px;bottom:16px;z-index:40;display:flex;gap:8px;background:linear-gradient(180deg,#15110a,rgba(20,16,10,.97));border:1px solid var(--line);border-radius:999px;padding:6px;box-shadow:0 6px 20px rgba(0,0,0,.35)}
:root[data-theme="light"] .ctrl{background:linear-gradient(180deg,#f2e8d2,rgba(242,232,210,.97))}
.ctrl button{width:40px;height:40px;border-radius:50%;border:1px solid transparent;background:transparent;color:var(--ink);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .25s}
.ctrl button:hover{border-color:var(--gold);color:var(--gold2)}
</style>
</head>
<body>
<main class="wrap">
  <header>
    <div class="kicker">MYSKME · 英语王老师</div>
    <h1>听力 <em>训练场</em></h1>
    <p class="sub">神经网络配音 · 各设备一致 · 听后答题 · 可看原文</p>
    <div class="streak" id="streak"></div>
  </header>
  <div id="stage"><div class="msg">正在取听力材料……</div></div>
  <footer>
    <a href="../">← 作品总目</a>　·　<a href="../write/">作文训练场</a>　·　<a href="../daily/">每日一题</a>　·　边听边答，可反复重听
  </footer>
</main>
<div class="ctrl"><button id="themeBtn" title="切换主题">◐</button></div>
<script>
var LS='myskme-listen';
var $=function(s){return document.querySelector(s)};
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function todayStr(){var d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function load(){try{return JSON.parse(localStorage.getItem(LS)||'{}')}catch(e){return {}}}
function save(o){try{localStorage.setItem(LS,JSON.stringify(o))}catch(e){}}
function renderStreak(){
  var o=load(),done=o.done||{},today=todayStr(),streak=0,d=new Date();
  if(!done[today])d.setDate(d.getDate()-1);
  for(;;){var k=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');if(done[k]){streak++;d.setDate(d.getDate()-1)}else break}
  var dots='';for(var i=6;i>=0;i--){var dd=new Date();dd.setDate(dd.getDate()-i);var k=dd.getFullYear()+'-'+String(dd.getMonth()+1).padStart(2,'0')+'-'+String(dd.getDate()).padStart(2,'0');dots+='<div class="dot'+(done[k]?' on':'')+(i===0?' today':'')+'"></div>'}
  $('#streak').innerHTML='<span class="fire">🔥 连续 '+streak+' 天</span><div class="dots">'+dots+'</div><span class="prog" id="prog"></span>';
}
function markToday(){var o=load();o.done=o.done||{};o.done[todayStr()]=true;save(o);renderStreak();}

var cur=null; // 当前音频
function playSegs(segs,btn,now){
  if(cur){cur.pause();cur=null;}
  var i=0,a=new Audio();cur=a;
  a.addEventListener('ended',function(){i++;step()});
  a.addEventListener('error',function(){btn.classList.remove('playing');btn.textContent='▶ 重听';now.textContent='（音频加载失败）'});
  function step(){
    if(a!==cur)return;
    if(i>=segs.length){btn.classList.remove('playing');btn.textContent='▶ 重听';now.textContent='';cur=null;return;}
    a.src='audio/'+segs[i].file;now.textContent=segs.length>1?('第 '+(i+1)+'/'+segs.length+' 句'):'播放中…';a.play().catch(function(){});
  }
  btn.classList.add('playing');btn.textContent='■ 播放中';step();
}

var TOTAL=0,ANS=0,RIGHT=0;
function updProg(){var p=$('#prog');if(p)p.textContent=' · 已答 '+ANS+'/'+TOTAL+'（对 '+RIGHT+'）';}

function renderItem(it){
  var el=document.createElement('div');el.className='item';
  var qs=(it.qs||[]).map(function(q,qi){
    var opsH=q.ops.map(function(op,i){return '<button class="op" data-i="'+i+'"><span class="k">'+'ABCD'[i]+'</span>'+esc(op)+'</button>'}).join('');
    return '<div class="q" data-qi="'+qi+'"><p class="q-stem">'+(it.qs.length>1?('('+(qi+1)+') '):'')+esc(q.q)+'</p><div class="ops">'+opsH+'</div><div class="why"></div></div>';
  }).join('');
  var tr=it.segments.map(function(s){return '<div class="line">'+(it.kind==='dialogue'?'<span class="sp">'+(s.speaker==='A'?'A':'B')+'</span>':'')+esc(s.text)+'</div>'}).join('');
  el.innerHTML='<div class="it-top"><span class="kind">'+(it.kind==='dialogue'?'短对话':it.kind==='passage'?'短文':'跟读')+'</span><h3>'+esc(it.title)+'</h3></div>'
    +'<button class="play">▶ 播放</button> <span class="now"></span>'
    +qs
    +'<details class="script"><summary>📝 看原文 / 听力材料</summary>'+tr+'</details>';
  var btn=el.querySelector('.play'),now=el.querySelector('.now');
  btn.addEventListener('click',function(){playSegs(it.segments,btn,now)});
  el.querySelectorAll('.q').forEach(function(qd){
    var qi=+qd.getAttribute('data-qi'),q=it.qs[qi],ops=qd.querySelectorAll('.op');
    ops.forEach(function(b,i){b.addEventListener('click',function(){
      ops.forEach(function(x){x.disabled=true});
      if(i===q.ans)b.classList.add('correct');else{b.classList.add('wrong');if(ops[q.ans])ops[q.ans].classList.add('correct')}
      var w=qd.querySelector('.why');w.innerHTML='<b>'+(i===q.ans?'答对了！':'正确答案 '+'ABCD'[q.ans])+'</b>'+(q.why?'　'+esc(q.why):'');w.classList.add('show');
      ANS++;if(i===q.ans)RIGHT++;markToday();updProg();
    })});
  });
  return el;
}
async function boot(){
  renderStreak();
  try{
    var m=await (await fetch('listen.json',{cache:'no-store'})).json();
    var items=m.items||[];TOTAL=items.reduce(function(s,it){return s+((it.qs||[]).length)},0);updProg();
    var stage=$('#stage');stage.innerHTML='';
    items.forEach(function(it){stage.appendChild(renderItem(it))});
    if(!items.length)stage.innerHTML='<div class="msg">听力材料还在路上——等王老师的下一期。</div>';
  }catch(e){$('#stage').innerHTML='<div class="msg">听力材料取不到，检查网络后刷新。</div>'}
}
boot();
(function(){var TLS='myskme-theme',order=['auto','light','dark'],name={auto:'跟随系统',light:'浅色',dark:'深色'},icon={auto:'◐',light:'☀',dark:'☾'},mq=window.matchMedia?matchMedia('(prefers-color-scheme: dark)'):null;
function pref(){try{return localStorage.getItem(TLS)||'auto'}catch(e){return 'auto'}}
function resolve(p){return p==='auto'?((mq&&mq.matches)?'dark':'light'):p}
function apply(p){var e=document.documentElement;e.setAttribute('data-theme',resolve(p));e.setAttribute('data-themepref',p);var b=$('#themeBtn');if(b){b.textContent=icon[p];b.title='主题：'+name[p]}}
var b=$('#themeBtn');if(b)b.addEventListener('click',function(){var nx=order[(order.indexOf(pref())+1)%order.length];try{localStorage.setItem(TLS,nx)}catch(e){}apply(nx)});
if(mq&&mq.addEventListener)mq.addEventListener('change',function(){if(pref()==='auto')apply('auto')});apply(pref());})();
</script>
</body>
</html>
