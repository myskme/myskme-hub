<!doctype html>
<html lang="zh-CN" data-theme="dark" data-themepref="auto">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="robots" content="noindex,nofollow">
<title>MYSKME 控制台 · 王老师专用</title>
<script>
/* 预上色：避免主题闪烁 */
(function(){try{var p=localStorage.getItem('myskme-theme')||'auto';
var d=p==='auto'?(matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light'):p;
var e=document.documentElement;e.setAttribute('data-theme',d);e.setAttribute('data-themepref',p);}catch(err){}})();
</script>
<style>
:root{
  --bg:#0a0a0c; --bg2:#111114; --bg3:#16161a; --bg4:#1c1c22;
  --ink:#f0e6d2; --ink2:#a8a090; --ink3:#928a7a; --ink4:#8f8676;
  --gold:#c9a64a; --gold2:#e8c768; --gold3:#7a6320;
  --red:#a83030; --red2:#d56060;
  --blue:#5a86c9; --green:#5aa86a;
  --line:rgba(201,166,74,.22); --line2:rgba(201,166,74,.09);
  --glow-gold:0 0 24px rgba(201,166,74,.4);
  --serif:"Noto Serif SC","Source Han Serif SC","Songti SC","STSong","SimSun",serif;
  --mono:ui-monospace,"SF Mono","Cascadia Code","Menlo",Consolas,monospace;
  --page-grad:radial-gradient(1200px 700px at 50% -8%,rgba(201,166,74,.10),transparent 60%),radial-gradient(900px 900px at 100% 100%,rgba(90,60,20,.10),transparent 60%);
  --vignette:radial-gradient(ellipse at 50% 40%,transparent 55%,rgba(0,0,0,.55));
  --card-bg:linear-gradient(160deg,var(--bg3),var(--bg2));
  --card-hover-shadow:0 16px 44px rgba(0,0,0,.5),inset 0 0 40px rgba(201,166,74,.05);
  --bar-bg:linear-gradient(180deg,#15110a,rgba(20,16,10,.97));
}
:root[data-theme="light"]{
  --bg:#ece2cc; --bg2:#e4d8bc; --bg3:#f8f2e4; --bg4:#e0d3b3;
  --ink:#2a2218; --ink2:#574b37; --ink3:#635943; --ink4:#6f6443;
  --gold:#6f5410; --gold2:#5f470e; --gold3:#b89a52;
  --red:#9a271d; --red2:#7a1c14;
  --blue:#33548c; --green:#2f6a3e;
  --line:rgba(120,90,20,.30); --line2:rgba(120,90,20,.13);
  --glow-gold:0 4px 16px rgba(120,90,20,.18);
  --page-grad:radial-gradient(1200px 700px at 50% -8%,rgba(190,160,80,.18),transparent 60%),radial-gradient(900px 760px at 100% 100%,rgba(150,120,60,.12),transparent 60%);
  --vignette:radial-gradient(ellipse at 50% 40%,transparent 60%,rgba(120,90,30,.12));
  --card-bg:linear-gradient(160deg,var(--bg3),#f1e9d6);
  --card-hover-shadow:0 14px 34px rgba(120,90,30,.20),inset 0 0 40px rgba(201,166,74,.06);
  --bar-bg:linear-gradient(180deg,#f2e8d2,rgba(242,232,210,.97));
}
*{box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--serif);line-height:1.7;
  overflow-x:hidden;background-image:var(--page-grad);background-attachment:fixed;
  transition:background-color .35s ease,color .35s ease;}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background:var(--vignette);}
a{color:inherit;}

/* ---------- 密码门 ---------- */
.gate{position:fixed;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;
  padding:24px;background:var(--bg);background-image:var(--page-grad);}
.gate-card{position:relative;width:min(420px,100%);background:var(--card-bg);border:1px solid var(--line);
  padding:38px 32px 30px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.45);}
.gate-emblem{width:60px;height:60px;margin:0 auto 18px;border:1.5px solid var(--gold);border-radius:50%;
  display:flex;align-items:center;justify-content:center;font-size:28px;color:var(--gold);
  box-shadow:var(--glow-gold);}
.gate-card h1{font-size:21px;font-weight:500;letter-spacing:.16em;margin:0 0 4px;}
.gate-card .gk{font-size:11px;letter-spacing:.4em;color:var(--gold);text-transform:uppercase;margin-bottom:18px;}
.gate-card p{color:var(--ink3);font-size:12.5px;letter-spacing:.04em;margin:0 0 20px;line-height:1.6;}
.gate-card input{width:100%;background:var(--bg);border:1px solid var(--line);color:var(--ink);
  font-family:var(--serif);font-size:16px;padding:12px 14px;text-align:center;letter-spacing:.1em;outline:none;}
.gate-card input:focus{border-color:var(--gold);box-shadow:var(--glow-gold);}
.gate-card .err{color:var(--red2);font-size:12px;min-height:18px;margin-top:10px;letter-spacing:.04em;}
.gate-card button{margin-top:8px;width:100%;}

/* ---------- 主体 ---------- */
.wrap{position:relative;z-index:1;max-width:1120px;margin:0 auto;
  padding:clamp(30px,6vw,64px) clamp(16px,5vw,44px) 120px;}
header{text-align:center;margin-bottom:clamp(28px,5vw,46px);}
.kicker{font-size:12px;letter-spacing:.4em;color:var(--gold);text-transform:uppercase;}
.title-hero{font-size:clamp(28px,5.4vw,52px);font-weight:300;letter-spacing:.14em;margin:.3em 0 .12em;}
.title-hero em{font-style:normal;color:var(--gold);font-weight:500;text-shadow:var(--glow-gold);}
.subhead{color:var(--ink2);letter-spacing:.1em;font-size:13.5px;}
.warnbar{margin:18px auto 0;max-width:680px;border:1px dashed var(--line);background:var(--card-bg);
  padding:10px 16px;font-size:12px;letter-spacing:.03em;color:var(--ink3);line-height:1.55;}
.warnbar b{color:var(--gold);}

.rule{display:flex;align-items:center;gap:18px;margin:clamp(34px,6vw,52px) 0 22px;}
.rule::before,.rule::after{content:'';height:1px;flex:1;background:linear-gradient(90deg,transparent,var(--line),transparent);}
.rule span{font-size:13px;letter-spacing:.3em;color:var(--gold);white-space:nowrap;
  text-shadow:0 0 18px rgba(201,166,74,.22);}
.rule small{font-size:11px;letter-spacing:.12em;color:var(--ink3);margin-left:8px;}

.grid{display:grid;gap:16px;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));}

.ornate{position:relative;}
.ornate::before,.ornate::after{content:'';position:absolute;width:11px;height:11px;border:1px solid var(--gold);
  transition:all .35s cubic-bezier(.16,1,.3,1);opacity:.55;}
.ornate::before{top:-1px;left:-1px;border-right:0;border-bottom:0;}
.ornate::after{bottom:-1px;right:-1px;border-left:0;border-top:0;}
.ornate:hover::before,.ornate:hover::after{width:20px;height:20px;opacity:1;}

.card{background:var(--card-bg);border:1px solid var(--line);padding:16px 16px 14px;
  display:flex;flex-direction:column;gap:10px;transition:transform .4s cubic-bezier(.16,1,.3,1),border-color .3s,box-shadow .4s;}
.card:hover{transform:translateY(-3px);border-color:var(--gold);box-shadow:var(--card-hover-shadow);}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;}
.card h3{font-size:16px;font-weight:500;letter-spacing:.04em;margin:0;line-height:1.35;}
.card .en{font-size:11px;letter-spacing:.12em;color:var(--ink3);text-transform:uppercase;margin-top:2px;}
.card .url{font-family:var(--mono);font-size:11px;color:var(--ink2);word-break:break-all;line-height:1.45;}
.card .note{font-size:12px;color:var(--ink2);line-height:1.6;}
.card .note b{color:var(--gold);font-weight:500;}
.card .note code{font-family:var(--mono);background:rgba(201,166,74,.1);border:1px solid var(--line2);
  padding:1px 6px;border-radius:3px;color:var(--gold2);font-size:11px;}
:root[data-theme="light"] .card .note code{color:var(--gold2);background:rgba(120,90,20,.08);}
.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:auto;padding-top:4px;}

.badge{font-size:10px;letter-spacing:.1em;padding:2px 8px;border:1px solid var(--line);border-radius:999px;
  white-space:nowrap;color:var(--ink3);text-transform:uppercase;}
.badge.pages{color:var(--green);border-color:color-mix(in srgb,var(--green) 45%,transparent);}
.badge.netlify{color:var(--blue);border-color:color-mix(in srgb,var(--blue) 45%,transparent);}
.badge.free{color:var(--green);border-color:color-mix(in srgb,var(--green) 45%,transparent);}
.badge.svip{color:var(--red2);border-color:color-mix(in srgb,var(--red2) 50%,transparent);}
.badge.code{color:var(--gold2);border-color:var(--gold3);}
:root[data-theme="light"] .badge.code{border-color:var(--gold);}

.btn{font-family:var(--serif);font-size:12px;letter-spacing:.06em;padding:7px 13px;border:1px solid var(--line);
  background:transparent;color:var(--ink);cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;
  justify-content:center;gap:5px;min-height:36px;
  transition:border-color .25s,box-shadow .25s,color .25s,background .25s;border-radius:2px;}
.btn:hover{border-color:var(--gold);color:var(--gold);box-shadow:var(--glow-gold);}
.btn-go{border-color:var(--gold3);color:var(--gold2);}
.btn-go:hover{background:rgba(201,166,74,.08);}

/* 题库行 */
.bank{display:grid;grid-template-columns:auto 1fr auto;gap:12px 14px;align-items:center;
  background:var(--card-bg);border:1px solid var(--line);padding:12px 14px;}
.bank:hover{border-color:var(--gold);}
.bank .code{font-family:var(--mono);font-size:15px;font-weight:600;color:var(--gold2);letter-spacing:.04em;}
.bank .bmeta{min-width:0;}
.bank .bname{font-size:13px;color:var(--ink);line-height:1.4;}
.bank .bsub{font-size:11px;color:var(--ink3);margin-top:2px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.bank .bact{display:flex;gap:7px;flex-wrap:wrap;justify-content:flex-end;}
@media(max-width:560px){.bank{grid-template-columns:auto 1fr;}.bank .bact{grid-column:1/-1;justify-content:flex-start;}}

/* 速查卡 */
.cheat{display:grid;gap:10px;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));}
.cheat-row{display:flex;align-items:center;justify-content:space-between;gap:12px;
  background:var(--card-bg);border:1px solid var(--line);padding:12px 14px;}
.cheat-row .cl{font-size:12px;color:var(--ink2);letter-spacing:.04em;}
.cheat-row .cv{display:flex;align-items:center;gap:8px;}
.cheat-row .cv code{font-family:var(--mono);font-size:14px;color:var(--gold2);letter-spacing:.06em;}
.cheat-row .copy{font-size:11px;border:1px solid var(--line);background:transparent;color:var(--ink3);
  cursor:pointer;padding:8px 12px;min-height:34px;border-radius:2px;transition:all .2s;}
.cheat-row .copy:hover{border-color:var(--gold);color:var(--gold);}

/* 排行榜审核 */
.lba-bar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:12px}
.lba-row{display:flex;align-items:center;gap:12px;background:var(--card-bg);border:1px solid var(--line);padding:10px 14px;margin-bottom:8px}
.lba-row.hid{opacity:.5}
.lba-who{flex:1;min-width:0}
.lba-who .a{font-size:14px;letter-spacing:.02em}
.lba-who .m{font-size:11px;color:var(--ink3);font-family:var(--mono);margin-top:2px}
.lba-pow{font-family:var(--mono);color:var(--gold2);font-size:15px;font-weight:600;flex-shrink:0}
.lba-act{display:flex;gap:6px;flex-shrink:0}
.lba-act button{font-family:var(--serif);font-size:11px;padding:6px 11px;border:1px solid var(--line);background:transparent;color:var(--ink2);cursor:pointer;border-radius:2px;transition:border-color .2s,color .2s}
.lba-act button:hover{border-color:var(--gold);color:var(--gold)}
.lba-act button.del:hover{border-color:var(--red);color:var(--red2)}
.lba-msg{color:var(--ink3);font-size:13px;padding:10px 2px}

/* 右下角控制 */
.ctrl{position:fixed;right:16px;bottom:16px;z-index:30;display:flex;gap:8px;background:var(--bar-bg);
  border:1px solid var(--line);border-radius:999px;padding:6px;box-shadow:0 6px 20px rgba(0,0,0,.35);}
.ctrl button{width:40px;height:40px;border-radius:50%;border:1px solid transparent;background:transparent;
  color:var(--ink);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:border-color .25s,box-shadow .25s,color .25s;}
.ctrl button:hover{border-color:var(--gold);color:var(--gold);box-shadow:var(--glow-gold);}

#toast{position:fixed;left:50%;bottom:84px;transform:translateX(-50%) translateY(16px);z-index:60;
  background:var(--bar-bg);border:1px solid var(--gold3);color:var(--ink);padding:10px 18px;font-size:13px;
  letter-spacing:.04em;opacity:0;pointer-events:none;transition:opacity .3s,transform .3s;white-space:nowrap;border-radius:3px;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

footer{margin-top:60px;text-align:center;color:var(--ink4);font-size:11px;letter-spacing:.14em;}
[hidden]{display:none!important;}
</style>
</head>
<body>

<!-- ===== 密码门 ===== -->
<div class="gate ornate" id="gate">
  <div class="gate-card ornate">
    <div class="gate-emblem">狼</div>
    <div class="gk">Console</div>
    <h1>MYSKME 控制台</h1>
    <p>王老师专用 · 聚合各作品后台入口、口令与兑换码。<br>请输入管理员密码进入。</p>
    <input id="pwIn" type="password" inputmode="text" autocomplete="off" autocapitalize="off"
           spellcheck="false" placeholder="管理员密码" aria-label="管理员密码">
    <div class="err" id="pwErr"></div>
    <button class="btn btn-go" id="pwOk" style="justify-content:center">进 入 ↗</button>
  </div>
</div>

<!-- ===== 主体 ===== -->
<main class="wrap" id="app" hidden>
  <header>
    <div class="kicker">MYSKME · 王老师 Mr. Wang</div>
    <h1 class="title-hero">作品 <em>控制台</em></h1>
    <div class="subhead">Make Yourself Special &amp; Kind · 后台总览</div>
    <div class="warnbar">
      此页为<b>软门</b>（密码同站内公开源码，仅防误入，非加密）。请<b>勿公开分享本网址</b>；
      它聚合了所有后台入口、口令与兑换码，仅供你本人备查。
    </div>
  </header>

  <div class="rule"><span>作 品 速 达</span></div>
  <div id="works"></div>

  <div class="rule"><span>题 库 兑 换 码</span><small id="bankStat"></small></div>
  <div class="grid" style="grid-template-columns:1fr" id="banks"></div>

  <div class="rule"><span>后 台 与 工 具</span></div>
  <div class="grid" id="tools"></div>

  <div class="rule"><span>排 行 榜 审 核</span><small id="lbStat"></small></div>
  <div id="lbAdmin"></div>

  <div class="rule"><span>口 令 速 查</span></div>
  <div class="cheat" id="cheat"></div>

  <footer>MYSKME 控制台 · 仅供王老师本人备查 · 改动作品请走各自后台</footer>
</main>

<!-- ===== 控制 ===== -->
<div class="ctrl">
  <button id="themeBtn" title="切换主题">◐</button>
  <button id="lockBtn" title="锁定退出" hidden>🔒</button>
</div>
<div id="toast"></div>

<script>
/* ======================== 数据（可直接改） ======================== */
var GAMES = "https://myskme-games.netlify.app";

/* 作品分组：每个作品 = {t标题, en, url, plat平台标签, note后台说明(HTML)} */
var GROUPS = [
  {label:"枢纽 · GitHub Pages（可网页自助更新）", sub:"myskme-hub", items:[
    {t:"作品总目 Hub", en:"Hub Index", url:"https://myskme.github.io/myskme-hub/", plat:"pages",
     note:'左下角 <b>✎</b> → 输入<b>本页密码</b> → 改文案/网址、增删排序作品；「导出 index.html」重新部署即更新。'},
    {t:"题库书架", en:"Question Banks", url:"https://myskme.github.io/myskme-hub/banks/", plat:"pages",
     note:'公开页（无门）。自动展示 CMS 已发布题库；<b>📥 导出书架海报</b>（浅色 + 兑换码 + 二维码）。'},
    {t:"荣誉殿堂 · 作文墙", en:"Wall of Fame", url:"https://myskme.github.io/myskme-hub/wall/", plat:"pages",
     note:'班级口令 <code id="wallPw"></code> 进入；左下角 <b>✎</b> → 输入<b>本页密码</b> → <b>＋ 加作品</b>(作文扫描件) / <b>换图</b> / <b>📥 导出作文墙海报</b>。'},
  ]},
  {label:"题库训练场 · Netlify（无 git 自动部署）", sub:"myskme-games", items:[
    {t:"题库训练场 入口", en:"Quiz Trainer", url:GAMES+"/", plat:"netlify",
     note:'启动页(网站根 index)，分流到词灵对决 / 无名之原。改启动页需整站重新部署；只改词灵对决才用 <code>deploy_wordduel.py</code>（仅换 word-duel.html，要 Netlify 令牌）。'},
    {t:"词灵对决", en:"Word Duel", url:GAMES+"/word-duel", plat:"netlify",
     note:'兑换码装题库；扫卷尾码 <code>?code=卷号</code> 自动装当期；战绩页「<b>📋 家长周报</b>」导出周报卡（已上线）。'},
    {t:"无名之原", en:"Nameless Plain", url:GAMES+"/plain", plat:"netlify",
     note:'答题闯关。题库来源同书架（跨域读 hub <code>banks/</code>）。'},
  ]},
  {label:"课堂积分 / 叙事", sub:"scoreboards · RPG · lore", items:[
    {t:"世界编年史 II", en:"VOLVME II", url:"https://myskme-volvme-ii.netlify.app", plat:"netlify",
     note:'剧情 / 世界观档案。Netlify 拖拽部署，<b>无 git 仓库</b>。'},
    {t:"远征录 · 笼中剑", en:"Expedition", url:"https://myskme-expedition.netlify.app", plat:"netlify",
     note:'学院谷地 RPG。Netlify 拖拽部署，<b>无 git 仓库</b>。'},
    {t:"积分板", en:"Scoreboard", url:"https://myskme.github.io/myskme-scoreboard/", plat:"pages",
     note:'课堂积分 PWA。repo <code>myskme/myskme-scoreboard</code>，push 即更新。'},
    {t:"三国军师争霸", en:"Three Kingdoms", url:"https://myskme.github.io/three-kingdoms-classroom-scoreboard/", plat:"pages",
     note:'三国主题积分器。repo <code>three-kingdoms-classroom-scoreboard</code>。'},
    {t:"大乱斗", en:"MYSKME Brawl", url:"https://myskme.github.io/myskme-brawl/", plat:"pages",
     note:'积分 + 黑域塔防。repo <code>myskme/myskme-brawl</code>。'},
  ]},
];

/* 题库（与 banks/index.json 同步；新增题库请走 Pages CMS / banks/src） */
var BANKS = [
  {code:"MIX1", name:"易混词辨析 · 第一辑", tier:"free", count:30},
  {code:"MIX2", name:"易混词辨析 · 第二辑", tier:"free", count:30},
  {code:"TRAP1", name:"语法陷阱训练营 · 第一辑", tier:"free", count:32},
  {code:"TRAP2", name:"假被动炼狱 · 亦真亦假", tier:"svip", count:26},
  {code:"TRAP3", name:"时态错配炼狱 · 亦真亦假", tier:"svip", count:24},
  {code:"TRAP4", name:"主谓一致炼狱 · 就近与整体", tier:"svip", count:24},
];

/* 后台与工具 */
var TOOLS = [
  {t:"Pages CMS · 自助后台", en:"题库 + 作文墙", url:"https://app.pagescms.org", plat:"",
   note:'GitHub 登录 → 选 <code>myskme/myskme-hub</code> → 「题库」或「作文墙」集合。题库存 <code>banks/src/&lt;码&gt;.json</code>，保存后 Action 自动构建上线。'},
  {t:"Netlify 控制台", en:"deploy / domains", url:"https://app.netlify.com", plat:"",
   note:'games / 远征录 / 编年史 为拖拽部署，在此管理（部署账号见本地备忘）。'},
  {t:"GitHub · myskme", en:"repositories", url:"https://github.com/myskme", plat:"",
   note:'公开：<code>myskme-hub</code> / scoreboard / three-kingdoms / brawl。私有·仅本地：<code>myskme-games</code>。'},
  {t:"题库书架（源 JSON）", en:"banks/index.json", url:"https://myskme.github.io/myskme-hub/banks/index.json", plat:"pages",
   note:'当前已发布题库目录（跨域可读，词灵对决/无名之原 即从此拉取）。'},
];

/* 口令速查（兑换码已公开于书架；密码为软门） */
var WALL_GATE = "myskme2026";

/* ======================== 渲染 ======================== */
var $=function(s,r){return (r||document).querySelector(s);};
var ADMIN_PW=""; // 解锁时由用户输入回填，不写入源码

function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function toast(m){var t=$('#toast');t.textContent=m;t.classList.add('show');
  clearTimeout(toast._t);toast._t=setTimeout(function(){t.classList.remove('show');},1800);}

function copy(txt,label){
  function ok(){toast('已复制 '+(label||txt));}
  function fb(){try{var ta=document.createElement('textarea');ta.value=txt;ta.style.position='fixed';
    ta.style.opacity='0';document.body.appendChild(ta);ta.select();document.execCommand('copy');
    document.body.removeChild(ta);}catch(e){}}
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt).then(ok,function(){fb();ok();});
  }else{fb();ok();}
}

function platBadge(p){
  if(p==='pages')return '<span class="badge pages">Pages</span>';
  if(p==='netlify')return '<span class="badge netlify">Netlify</span>';
  return '';
}

function renderWorks(){
  var html='';
  GROUPS.forEach(function(g){
    html+='<div class="rule" style="margin:26px 0 14px"><span style="font-size:12px;letter-spacing:.18em">'
      +esc(g.label)+'</span><small>'+esc(g.sub)+'</small></div>';
    html+='<div class="grid">';
    g.items.forEach(function(it){
      html+='<div class="card ornate">'
        +'<div class="card-top"><div><h3>'+esc(it.t)+'</h3><div class="en">'+esc(it.en)+'</div></div>'
        +platBadge(it.plat)+'</div>'
        +'<div class="url">'+esc(it.url)+'</div>'
        +'<div class="note">'+it.note+'</div>'
        +'<div class="actions">'
        +'<a class="btn btn-go" href="'+esc(it.url)+'" target="_blank" rel="noopener">打开 ↗</a>'
        +'<button class="btn" data-copy="'+esc(it.url)+'">复制网址</button>'
        +'</div></div>';
    });
    html+='</div>';
  });
  $('#works').innerHTML=html;
}

function renderBanks(){
  var free=0,svip=0;
  var html=BANKS.map(function(b){
    if(b.tier==='free')free++;else if(b.tier==='svip')svip++;
    var deep=GAMES+'/word-duel?code='+b.code;
    var tierLabel=b.tier==='free'?'免费':(b.tier==='svip'?'☠ 炼狱(SVIP)':'兑换码');
    return '<div class="bank">'
      +'<div class="code">'+esc(b.code)+'</div>'
      +'<div class="bmeta"><div class="bname">'+esc(b.name)+'</div>'
      +'<div class="bsub"><span class="badge '+esc(b.tier)+'">'+tierLabel+'</span>'
      +'<span>'+b.count+' 题</span><span style="color:var(--ink4)">'+esc(deep.replace('https://',''))+'</span></div></div>'
      +'<div class="bact">'
      +'<button class="btn" data-copy="'+esc(b.code)+'">复制码</button>'
      +'<button class="btn" data-copy="'+esc(deep)+'" data-label="装库链接">复制链接</button>'
      +'<a class="btn btn-go" href="'+esc(deep)+'" target="_blank" rel="noopener">去测试 ↗</a>'
      +'</div></div>';
  }).join('');
  $('#banks').innerHTML=html;
  var total=BANKS.reduce(function(s,b){return s+b.count;},0);
  $('#bankStat').textContent=BANKS.length+' 辑 · '+total+' 题 · 免费 '+free+' / SVIP '+svip;
}

function renderTools(){
  $('#tools').innerHTML=TOOLS.map(function(it){
    return '<div class="card ornate">'
      +'<div class="card-top"><div><h3>'+esc(it.t)+'</h3><div class="en">'+esc(it.en)+'</div></div>'
      +platBadge(it.plat)+'</div>'
      +'<div class="url">'+esc(it.url)+'</div>'
      +'<div class="note">'+it.note+'</div>'
      +'<div class="actions"><a class="btn btn-go" href="'+esc(it.url)+'" target="_blank" rel="noopener">打开 ↗</a>'
      +'<button class="btn" data-copy="'+esc(it.url)+'">复制网址</button></div></div>';
  }).join('');
}

function renderCheat(){
  var codes=BANKS.map(function(b){return b.code;}).join(' / ');
  var rows=[
    {l:'管理员密码 · hub/书架/作文墙 通用', v:ADMIN_PW||'（你刚输入的密码）', copy:ADMIN_PW},
    {l:'作文墙 班级口令', v:WALL_GATE, copy:WALL_GATE},
    {l:'题库兑换码（全部）', v:codes, copy:codes},
  ];
  $('#cheat').innerHTML=rows.map(function(r){
    return '<div class="cheat-row"><span class="cl">'+esc(r.l)+'</span>'
      +'<span class="cv"><code>'+esc(r.v)+'</code>'
      +(r.copy?'<button class="copy" data-copy="'+esc(r.copy)+'">复制</button>':'')+'</span></div>';
  }).join('');
}

/* ---- 排行榜审核（调词灵榜 Worker /admin，复用本页解锁密码）---- */
var LB_API="https://myskme-leaderboard.wzc1020.workers.dev";
function lbaCall(action,extra){
  var b=extra||{}; b.pw=ADMIN_PW; b.action=action;
  return fetch(LB_API+'/admin',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(b)}).then(function(r){return r.json();});
}
function lbaLoad(){
  var rows=$('#lbaRows'); if(!rows)return;
  rows.innerHTML='<div class="lba-msg">读取中…</div>';
  lbaCall('list').then(function(r){
    if(!r||!r.ok){rows.innerHTML='<div class="lba-msg">读取失败：'+esc((r&&r.err)||'')+'</div>';return;}
    var list=r.rows||[]; var st=$('#lbStat'); if(st)st.textContent=list.length+' 条';
    if(!list.length){rows.innerHTML='<div class="lba-msg">词灵榜暂无记录。</div>';return;}
    rows.innerHTML=list.map(function(x){
      var scope=(x.is_class||x.class_tag)?'班级榜':'世界榜';
      return '<div class="lba-row'+(x.hidden?' hid':'')+'" data-id="'+esc(x.id)+'">'
        +'<div class="lba-who"><div class="a">'+esc(x.alias)+(x.faction?' · '+esc(x.faction):'')+(x.hidden?'（已隐藏）':'')+'</div>'
        +'<div class="m">'+esc(x.rank_name||'')+' · '+scope+'</div></div>'
        +'<div class="lba-pow">'+(+x.power||0)+'</div>'
        +'<div class="lba-act">'
        +'<button data-act="'+(x.hidden?'unhide':'hide')+'">'+(x.hidden?'显示':'隐藏')+'</button>'
        +'<button class="del" data-act="delete">删除</button>'
        +'</div></div>';
    }).join('');
  }).catch(function(){rows.innerHTML='<div class="lba-msg">连不上词灵榜后台。</div>';});
}
function renderLbAdmin(){
  $('#lbAdmin').innerHTML='<div class="lba-bar">'
    +'<button class="btn" id="lbaRefresh">刷新</button>'
    +'<button class="btn" id="lbaSeal">封榜·开新赛季</button>'
    +'<button class="btn" id="lbaReset">清空全部</button>'
    +'<span style="font-size:12px;color:var(--ink3)">化名 / 赛季灵力 / 段位 · 隐藏或删除可疑行</span></div>'
    +'<div id="lbaRows"><div class="lba-msg">读取中…</div></div>';
  $('#lbaRefresh').addEventListener('click',lbaLoad);
  $('#lbaSeal').addEventListener('click',function(){
    if(!confirm('封榜并开新赛季？\n本赛季世界前 10（及各班前 3）将永久镌刻名人堂；随后所有人「赛季灵力」清零进入下一赛季，「终身灵力」保留。'))return;
    lbaCall('seal',{confirm:'SEAL',top:10}).then(function(r){toast(r&&r.ok?('已封榜 '+(r.sealed||'')+' → 新赛季 '+(r.newSeason||'')):('封榜失败：'+((r&&r.err)||'')));lbaLoad();});
  });
  $('#lbaReset').addEventListener('click',function(){
    if(!confirm('清空整个词灵榜？所有上榜记录（含示例行）将永久删除。'))return;
    lbaCall('reset',{confirm:'RESET'}).then(function(r){toast(r&&r.ok?'已清空词灵榜':'清空失败');lbaLoad();});
  });
  lbaLoad();
}

function renderAll(){
  renderWorks();renderBanks();renderTools();renderCheat();renderLbAdmin();
  $('#wallPw') && ($('#wallPw').textContent=WALL_GATE); // 元素由 renderWorks 注入，须在其后填充
  // 事件委托：复制按钮 + 排行榜审核操作（仅注册一次，避免重复解锁时重复绑定）
  if(renderAll._wired)return; renderAll._wired=true;
  document.addEventListener('click',function(e){
    var el=e.target.closest('[data-copy]');
    if(el){copy(el.getAttribute('data-copy'),el.getAttribute('data-label')||el.getAttribute('data-copy'));return;}
    var b=e.target.closest('#lbaRows [data-act]');
    if(b){var row=b.closest('.lba-row'),id=row.getAttribute('data-id'),act=b.getAttribute('data-act');
      if(act==='delete'&&!confirm('删除「'+row.querySelector('.a').textContent.replace('（已隐藏）','').trim()+'」这条记录？'))return;
      lbaCall(act,{id:id}).then(function(r){toast(r&&r.ok?'操作成功':'操作失败');lbaLoad();});}
  });
}

/* ======================== 密码门逻辑 ======================== */
var PW_HASH="660f6c10b837bfafe392f871ec01c410c5adcd25f263bde0e3fa1dd0295827d2"; // sha256(管理员密码)
var SS_KEY="myskme-console-pw"; // 会话内记住已输入密码（关标签即失效）

async function sha256hex(s){
  try{
    var buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(s));
    return Array.from(new Uint8Array(buf)).map(function(b){return b.toString(16).padStart(2,'0');}).join('');
  }catch(e){return null;}
}

function unlock(pw){
  ADMIN_PW=pw;
  try{sessionStorage.setItem(SS_KEY,pw);}catch(e){}
  $('#gate').hidden=true;
  $('#app').hidden=false;
  $('#lockBtn').hidden=false;
  renderAll();
}

async function tryPw(pw){
  if(!pw){$('#pwErr').textContent='请输入密码';return;}
  var h=await sha256hex(pw);
  if(h===PW_HASH){unlock(pw);}
  else{$('#pwErr').textContent='密码不正确';$('#pwIn').select();}
}

(function init(){
  // 会话内已解锁过 → 直接进入
  try{var saved=sessionStorage.getItem(SS_KEY);
    if(saved){sha256hex(saved).then(function(h){if(h===PW_HASH)unlock(saved);});}
  }catch(e){}

  $('#pwOk').addEventListener('click',function(){tryPw($('#pwIn').value.trim());});
  $('#pwIn').addEventListener('keydown',function(e){if(e.key==='Enter')tryPw($('#pwIn').value.trim());});
  $('#pwIn').addEventListener('input',function(){$('#pwErr').textContent='';});
  $('#pwIn').focus();

  $('#lockBtn').addEventListener('click',function(){
    try{sessionStorage.removeItem(SS_KEY);}catch(e){}
    location.reload();
  });

  // 主题切换 跟随系统→浅→深
  var TLS='myskme-theme',order=['auto','light','dark'],
      name={auto:'跟随系统',light:'浅色',dark:'深色'},icon={auto:'◐',light:'☀',dark:'☾'},
      mq=window.matchMedia?matchMedia('(prefers-color-scheme: dark)'):null;
  function pref(){try{return localStorage.getItem(TLS)||'auto';}catch(e){return 'auto';}}
  function resolve(p){return p==='auto'?((mq&&mq.matches)?'dark':'light'):p;}
  function apply(p){var e=document.documentElement;e.setAttribute('data-theme',resolve(p));
    e.setAttribute('data-themepref',p);$('#themeBtn').textContent=icon[p];$('#themeBtn').title='主题：'+name[p];}
  $('#themeBtn').addEventListener('click',function(){
    var nxt=order[(order.indexOf(pref())+1)%order.length];
    try{localStorage.setItem(TLS,nxt);}catch(e){}apply(nxt);toast('主题：'+name[nxt]);});
  if(mq)mq.addEventListener('change',function(){if(pref()==='auto')apply('auto');});
  apply(pref());
})();
</script>
