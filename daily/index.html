<!doctype html>
<html lang="zh-CN" data-theme="dark" data-themepref="auto">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<script>(function(){try{var p=localStorage.getItem('myskme-theme')||'auto';var d=p==='auto'?(matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light'):p;var e=document.documentElement;e.setAttribute('data-theme',d);e.setAttribute('data-themepref',p)}catch(e){}})();</script>
<title>每日一题 · MYSKME 词灵对决</title>
<meta name="description" content="MYSKME · 每日一题：每天一道中考英语题，全网同题，练手打卡。">
<meta property="og:type" content="website">
<meta property="og:title" content="每日一题 · MYSKME 词灵对决">
<meta property="og:description" content="每天一道中考英语题，全网同题 · 打卡连胜 · 去词灵对决刷更多。">
<meta property="og:image" content="https://myskme.github.io/myskme-hub/og-cover.png">
<meta property="og:url" content="https://myskme.github.io/myskme-hub/daily/">
<style>
:root{
  --bg:#0a0a0c;--bg2:#111114;--bg3:#16161a;--bg4:#1c1c22;
  --ink:#f0e6d2;--ink2:#a8a090;--ink3:#6a6458;
  --gold:#c9a64a;--gold2:#e8c768;--gold3:#7a6320;--green:#6aa86a;--red:#d56060;--blue:#5a8ec8;
  --line:rgba(201,166,74,.22);--line2:rgba(201,166,74,.09);--glow:0 0 24px rgba(201,166,74,.4);
  --serif:"Noto Serif SC","Source Han Serif SC","Songti SC","STSong",serif;--mono:ui-monospace,Menlo,monospace;
}
:root[data-theme="light"]{
  --bg:#ece2cc;--bg2:#e4d8bc;--bg3:#f8f2e4;--bg4:#e0d3b3;
  --ink:#2a2218;--ink2:#574b37;--ink3:#635943;
  --gold:#6f5410;--gold2:#5f470e;--gold3:#b89a52;--green:#2f6a3e;--red:#9a271d;--blue:#33548c;
  --line:rgba(120,90,20,.30);--line2:rgba(120,90,20,.13);--glow:0 4px 16px rgba(120,90,20,.18);
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--serif);line-height:1.7;
  background-image:radial-gradient(1000px 600px at 50% -10%,rgba(201,166,74,.10),transparent 60%);background-attachment:fixed;
  transition:background-color .35s,color .35s}
:root[data-theme="light"] body{background-image:radial-gradient(1000px 600px at 50% -10%,rgba(190,160,80,.18),transparent 60%)}
.wrap{max-width:640px;margin:0 auto;padding:clamp(28px,6vw,60px) clamp(16px,5vw,32px) 90px}
header{text-align:center;margin-bottom:22px}
.kicker{font-size:12px;letter-spacing:.4em;color:var(--gold);text-transform:uppercase}
h1{font-size:clamp(26px,5vw,42px);font-weight:300;letter-spacing:.14em;margin:.3em 0 .1em}
h1 em{font-style:normal;color:var(--gold);font-weight:500;text-shadow:var(--glow)}
.date{color:var(--ink2);letter-spacing:.1em;font-size:14px}
.streak{display:flex;align-items:center;justify-content:center;gap:14px;margin:16px 0 4px;flex-wrap:wrap}
.streak .fire{font-size:15px;color:var(--gold2)}
.dots{display:flex;gap:6px}
.dot{width:16px;height:16px;border:1px solid var(--line);border-radius:50%}
.dot.on{background:var(--gold);border-color:var(--gold);box-shadow:var(--glow)}
.dot.today{border-color:var(--gold2)}
.card{background:linear-gradient(160deg,var(--bg3),var(--bg2));border:1px solid var(--line);padding:22px 22px 20px;margin-top:20px;position:relative}
:root[data-theme="light"] .card{background:linear-gradient(160deg,var(--bg3),#f1e9d6)}
.badge{display:inline-block;font-size:11px;letter-spacing:.12em;color:var(--gold2);border:1px solid var(--gold3);padding:2px 10px;border-radius:999px;margin-bottom:14px}
.passage{border:1px solid var(--line2);background:var(--bg);padding:14px 16px;font-size:15px;line-height:1.9;margin-bottom:16px;max-height:34vh;overflow:auto}
.passage .lbl{font-size:11px;letter-spacing:.28em;color:var(--gold);text-transform:uppercase;margin-bottom:6px}
.passage .blank,.q .blank{color:var(--gold2);border-bottom:2px solid var(--gold);padding:0 10px}
.q{font-size:clamp(18px,2.6vw,22px);line-height:1.75;margin-bottom:18px}
.ops{display:flex;flex-direction:column;gap:11px}
.op{border:1px solid var(--line);background:var(--bg);padding:14px 18px;font-size:17px;cursor:pointer;text-align:left;
  transition:border-color .2s,background .2s,transform .1s;border-radius:3px;font-family:var(--serif);color:var(--ink)}
.op:hover:not(:disabled){border-color:var(--gold);transform:translateY(-1px)}
.op .k{color:var(--gold);margin-right:10px;font-family:var(--mono);font-size:.9em}
.op.correct{border-color:var(--green);background:rgba(106,168,106,.14)}
.op.wrong{border-color:var(--red);background:rgba(213,96,96,.12)}
.op:disabled{cursor:default}
.why{margin-top:16px;padding:14px 16px;border-left:3px solid var(--gold3);background:var(--bg);font-size:14.5px;color:var(--ink2);display:none}
.why.show{display:block}
.why b{color:var(--gold2)}
.act{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px}
.btn{font-family:var(--serif);font-size:14px;letter-spacing:.05em;padding:10px 18px;border:1px solid var(--line);background:transparent;color:var(--ink);cursor:pointer;text-decoration:none;border-radius:2px;transition:all .2s;display:inline-flex;align-items:center;gap:6px}
.btn:hover{border-color:var(--gold);color:var(--gold2)}
.btn.go{border-color:var(--gold3);color:var(--gold2)}
.msg{text-align:center;color:var(--ink3);padding:40px 0;letter-spacing:.08em}
footer{margin-top:40px;padding-top:20px;border-top:1px solid var(--line2);text-align:center;color:var(--ink3);font-size:13px}
footer a{color:var(--gold2);text-decoration:none}
.ctrl{position:fixed;right:16px;bottom:16px;z-index:40;display:flex;gap:8px;background:linear-gradient(180deg,#15110a,rgba(20,16,10,.97));border:1px solid var(--line);border-radius:999px;padding:6px;box-shadow:0 6px 20px rgba(0,0,0,.35)}
:root[data-theme="light"] .ctrl{background:linear-gradient(180deg,#f2e8d2,rgba(242,232,210,.97))}
.ctrl button{width:40px;height:40px;border-radius:50%;border:1px solid transparent;background:transparent;color:var(--ink);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .25s}
.ctrl button:hover{border-color:var(--gold);color:var(--gold2)}
</style>
</head>
<body>
<main class="wrap">
  <header>
    <div class="kicker">MYSKME · 词灵对决</div>
    <h1>每日 <em>一题</em></h1>
    <div class="date" id="date"></div>
    <div class="streak" id="streak"></div>
  </header>
  <div id="stage"><div class="msg">正在取今日一题……</div></div>
  <footer>
    <a href="../">← 作品总目</a>　·　<a href="../banks/">题库书架</a>　·　全网同题 · 每天 0 点换新
  </footer>
</main>
<div class="ctrl"><button id="themeBtn" title="切换主题">◐</button></div>
<script>
var SHELF='https://myskme.github.io/myskme-hub/banks/';
var GAME='https://myskme-games.netlify.app/word-duel?code=';
var LS='myskme-daily';
var $=function(s){return document.querySelector(s)};
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function todayStr(){var d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function dayNum(s){return Math.floor(Date.parse(s+'T00:00:00')/86400000)}
function load(){try{return JSON.parse(localStorage.getItem(LS)||'{}')}catch(e){return {}}}
function save(o){try{localStorage.setItem(LS,JSON.stringify(o))}catch(e){}}

function renderStreak(){
  var o=load(),done=o.done||{},today=todayStr();
  // 连续天数（到今天或昨天为止）
  var streak=0,d=new Date();
  if(!done[today]){d.setDate(d.getDate()-1);} // 今天没答就从昨天往回数
  for(;;){var k=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');if(done[k]){streak++;d.setDate(d.getDate()-1);}else break;}
  var dots='';for(var i=6;i>=0;i--){var dd=new Date();dd.setDate(dd.getDate()-i);var k=dd.getFullYear()+'-'+String(dd.getMonth()+1).padStart(2,'0')+'-'+String(dd.getDate()).padStart(2,'0');dots+='<div class="dot'+(done[k]?' on':'')+(i===0?' today':'')+'"></div>';}
  $('#streak').innerHTML='<span class="fire">🔥 连续 '+streak+' 天</span><div class="dots">'+dots+'</div>';
}
function markDone(){var o=load();o.done=o.done||{};o.done[todayStr()]=true;save(o);renderStreak();}

function qHTML(it){
  var h='<span class="badge">'+esc(it.name||it.code)+(it.type==='reading'?' · 阅读':it.type==='cloze'?' · 完形':'')+'</span>';
  if(it.passage)h+='<div class="passage"><div class="lbl">阅读短文 Passage</div>'+esc(it.passage).replace(/\n/g,'<br>').replace(/___/g,'<span class="blank">　　</span>')+'</div>';
  h+='<div class="q">'+esc(it.q).replace(/___/g,'<span class="blank">　　</span>')+'</div>';
  h+='<div class="ops" id="ops"></div><div class="why" id="why"></div>';
  h+='<div class="act">'
    +'<a class="btn go" href="'+GAME+encodeURIComponent(it.code)+'" target="_blank" rel="noopener">去词灵对决刷这套 ↗</a>'
    +'<button class="btn" id="more">再来一题（练习）</button></div>';
  return h;
}
function renderQ(it,isDaily){
  $('#stage').innerHTML='<div class="card">'+qHTML(it)+'</div>';
  var ops=$('#ops'),keys=['A','B','C','D','E'];
  it.ops.forEach(function(op,i){
    var b=document.createElement('button');b.className='op';b.innerHTML='<span class="k">'+keys[i]+'</span>'+esc(op);
    b.addEventListener('click',function(){
      Array.prototype.forEach.call(ops.children,function(x){x.disabled=true});
      if(i===it.ans){b.classList.add('correct');}else{b.classList.add('wrong');if(ops.children[it.ans])ops.children[it.ans].classList.add('correct');}
      var w=$('#why');w.innerHTML='<b>'+(i===it.ans?'答对了！':'正确答案 '+keys[it.ans])+'</b>'+(it.why?'　'+esc(it.why):'');w.classList.add('show');
      if(isDaily)markDone();
    });
    ops.appendChild(b);
  });
  $('#more').addEventListener('click',function(){renderQ(POOL[Math.floor(Math.random()*POOL.length)],false)});
}

var POOL=[];
function pickToday(){return POOL[dayNum(todayStr())%POOL.length]}
async function boot(){
  $('#date').textContent=todayStr();renderStreak();
  try{
    var cat=((await (await fetch(SHELF+'index.json',{cache:'no-store'})).json()).catalog||[]).slice().sort(function(a,b){return a.code<b.code?-1:1});
    var banks=await Promise.all(cat.map(function(c){return fetch(SHELF+c.code+'.json').then(function(r){return r.json()}).catch(function(){return null})}));
    banks.forEach(function(bk,i){if(!bk)return;var c=cat[i];['m4','m5'].forEach(function(mk){(bk.mods&&bk.mods[mk]||[]).forEach(function(it){
      if(it&&Array.isArray(it.ops)&&it.ops.length>=2&&typeof it.ans==='number'&&it.ans>=0&&it.ans<it.ops.length)
        POOL.push({code:c.code,name:c.name,q:it.q,ops:it.ops,ans:it.ans,why:it.why,passage:it.passage,type:it.type});
    })})});
    if(!POOL.length){$('#stage').innerHTML='<div class="msg">题库还在路上——等王老师的下一期。</div>';return;}
    renderQ(pickToday(),true);
  }catch(e){$('#stage').innerHTML='<div class="msg">今日一题取不到，检查下网络再刷新。</div>';}
}
boot();
(function(){var TLS='myskme-theme',order=['auto','light','dark'],name={auto:'跟随系统',light:'浅色',dark:'深色'},icon={auto:'◐',light:'☀',dark:'☾'},mq=window.matchMedia?matchMedia('(prefers-color-scheme: dark)'):null;
function pref(){try{return localStorage.getItem(TLS)||'auto'}catch(e){return 'auto'}}
function resolve(p){return p==='auto'?((mq&&mq.matches)?'dark':'light'):p}
function apply(p){var e=document.documentElement;e.setAttribute('data-theme',resolve(p));e.setAttribute('data-themepref',p);var b=$('#themeBtn');if(b){b.textContent=icon[p];b.title='主题：'+name[p]}}
var b=$('#themeBtn');if(b)b.addEventListener('click',function(){var nx=order[(order.indexOf(pref())+1)%order.length];try{localStorage.setItem(TLS,nx)}catch(e){}apply(nx)});
if(mq&&mq.addEventListener)mq.addEventListener('change',function(){if(pref()==='auto')apply('auto')});apply(pref());})();
</script>
</body>
</html>
