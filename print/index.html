<!doctype html>
<html lang="zh-CN" data-theme="dark" data-themepref="auto">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<script>(function(){try{var p=localStorage.getItem('myskme-theme')||'auto';var d=p==='auto'?(matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light'):p;var e=document.documentElement;e.setAttribute('data-theme',d);e.setAttribute('data-themepref',p)}catch(e){}})();</script>
<title>打印中心 · MYSKME × 英语王老师</title>
<meta name="description" content="MYSKME · 打印中心：任选题库一键生成可打印的选择题卷/答案版/词表/默写版，存 PDF 课堂发卷。">
<meta name="robots" content="noindex,nofollow">
<style>
:root{
  --bg:#0a0a0c;--bg2:#111114;--bg3:#16161a;--bg4:#1c1c22;
  --ink:#f0e6d2;--ink2:#a8a090;--ink3:#6a6458;
  --gold:#c9a64a;--gold2:#e8c768;--gold3:#7a6320;--green:#6aa86a;
  --line:rgba(201,166,74,.22);--line2:rgba(201,166,74,.09);--glow:0 0 24px rgba(201,166,74,.4);
  --serif:"Noto Serif SC","Source Han Serif SC","Songti SC","STSong",serif;--mono:ui-monospace,Menlo,monospace;
}
:root[data-theme="light"]{
  --bg:#ece2cc;--bg2:#e4d8bc;--bg3:#f8f2e4;--bg4:#e0d3b3;
  --ink:#2a2218;--ink2:#574b37;--ink3:#635943;
  --gold:#6f5410;--gold2:#5f470e;--gold3:#b89a52;--green:#2f6a3e;
  --line:rgba(120,90,20,.30);--line2:rgba(120,90,20,.13);--glow:0 4px 16px rgba(120,90,20,.18);
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--serif);line-height:1.7;
  background-image:radial-gradient(1000px 600px at 50% -10%,rgba(201,166,74,.10),transparent 60%);background-attachment:fixed;transition:background-color .35s,color .35s}
:root[data-theme="light"] body{background-image:radial-gradient(1000px 600px at 50% -10%,rgba(190,160,80,.18),transparent 60%)}
.wrap{max-width:820px;margin:0 auto;padding:clamp(26px,5vw,50px) clamp(14px,4vw,30px) 90px}
header{text-align:center;margin-bottom:16px}
.kicker{font-size:12px;letter-spacing:.4em;color:var(--gold);text-transform:uppercase}
h1{font-size:clamp(26px,5vw,42px);font-weight:300;letter-spacing:.14em;margin:.3em 0 .1em}
h1 em{font-style:normal;color:var(--gold);font-weight:500;text-shadow:var(--glow)}
.sub{color:var(--ink2);font-size:14px;margin:0}
.bar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;justify-content:center;margin:20px 0 6px}
select,.pbtn{font-family:var(--serif);font-size:14px;padding:9px 14px;border:1px solid var(--line);background:var(--bg2);color:var(--ink);border-radius:3px;cursor:pointer}
select:focus{outline:none;border-color:var(--gold)}
.modes{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin:6px 0}
.mode{font-size:13px;padding:7px 14px;border:1px solid var(--line);background:transparent;color:var(--ink2);cursor:pointer;border-radius:2px;font-family:var(--serif)}
.mode.on{color:var(--gold2);border-color:var(--gold3);background:rgba(201,166,74,.08)}
.pbtn{border-color:var(--gold3);color:var(--gold2);background:rgba(201,166,74,.1)}
.pbtn:hover{border-color:var(--gold);box-shadow:var(--glow)}
.hint{text-align:center;color:var(--ink3);font-size:12.5px;margin:8px 0 0}
.sheet{background:#fff;color:#111;margin:22px auto 0;max-width:760px;padding:40px 44px;border:1px solid var(--line);box-shadow:0 10px 40px rgba(0,0,0,.3);font-size:15px;line-height:1.9}
.sheet h2{font-size:22px;font-weight:700;text-align:center;margin:0 0 2px;letter-spacing:.04em}
.sheet .code{text-align:center;color:#8a6d1e;font-family:var(--mono);font-size:13px;letter-spacing:.1em;margin-bottom:12px}
.sheet .fields{display:flex;gap:24px;flex-wrap:wrap;border-bottom:1.5px solid #333;padding-bottom:10px;margin-bottom:16px;font-size:14px;color:#333}
.sheet .part{font-weight:700;margin:18px 0 8px;font-size:16px;border-left:4px solid #8a6d1e;padding-left:10px}
.sheet .psg{background:#f6f1e6;border:1px solid #d8cdae;padding:12px 14px;margin:10px 0;font-size:14px;line-height:1.9;border-radius:3px}
.sheet .psg b{color:#8a6d1e}
.sheet .qq{margin:11px 0;page-break-inside:avoid}
.sheet .qq .st{font-weight:600}
.sheet .ops{display:grid;grid-template-columns:1fr 1fr;gap:2px 22px;margin:4px 0 0 18px;font-size:14px}
.sheet .blank{border-bottom:1.5px solid #8a6d1e;padding:0 14px}
.sheet .ans{color:#b00;font-weight:700}
.sheet .why{color:#555;font-size:13px}
.sheet table{width:100%;border-collapse:collapse;font-size:14px}
.sheet td{border:1px solid #ccc;padding:7px 10px}
.sheet td.no{width:34px;text-align:center;color:#8a6d1e;font-family:var(--mono)}
.sheet td.wr{height:30px}
.sheet .foot{margin-top:22px;text-align:center;color:#8a6d1e;font-size:12px;border-top:1px solid #ddd;padding-top:10px}
.lock{max-width:440px;margin:26px auto 0;background:linear-gradient(160deg,var(--bg3),var(--bg2));border:1px solid var(--line);border-radius:6px;padding:28px 26px;text-align:center}
:root[data-theme="light"] .lock{background:linear-gradient(160deg,var(--bg3),#f1e9d6)}
.lock .ic{font-size:34px;color:var(--gold);margin-bottom:8px}
.lock h3{margin:0 0 6px;font-size:18px;font-weight:500}
.lock p{color:var(--ink2);font-size:13.5px;margin:0 0 16px;line-height:1.7}
.lock p b{color:var(--gold2)}
.lock input{width:100%;background:var(--bg);border:1px solid var(--line);color:var(--ink);font-family:var(--serif);font-size:16px;padding:11px 14px;text-align:center;letter-spacing:.1em;outline:none;border-radius:3px}
.lock input:focus{border-color:var(--gold);box-shadow:var(--glow)}
.lock button{margin-top:12px;width:100%;font-family:var(--serif);font-size:14px;padding:11px;border:1px solid var(--gold3);background:rgba(201,166,74,.1);color:var(--gold2);cursor:pointer;border-radius:3px}
.lock button:hover{border-color:var(--gold)}
.lock .err{color:#d56060;font-size:12.5px;min-height:16px;margin-top:8px}
.msg{text-align:center;color:var(--ink3);padding:40px 0}
footer{margin-top:36px;text-align:center;color:var(--ink3);font-size:13px}
footer a{color:var(--gold2);text-decoration:none}
.ctrl{position:fixed;right:16px;bottom:16px;z-index:40;display:flex;gap:8px;background:linear-gradient(180deg,#15110a,rgba(20,16,10,.97));border:1px solid var(--line);border-radius:999px;padding:6px;box-shadow:0 6px 20px rgba(0,0,0,.35)}
:root[data-theme="light"] .ctrl{background:linear-gradient(180deg,#f2e8d2,rgba(242,232,210,.97))}
.ctrl button{width:40px;height:40px;border-radius:50%;border:1px solid transparent;background:transparent;color:var(--ink);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .25s}
.ctrl button:hover{border-color:var(--gold);color:var(--gold2)}
@media print{
  @page{margin:16mm}
  body{background:#fff!important;background-image:none!important}
  .no-print{display:none!important}
  .sheet{margin:0;max-width:none;padding:0;border:0;box-shadow:none;color:#000;font-size:13.5px}
  .sheet .psg{background:transparent;border:1px solid #999}
}
</style>
</head>
<body>
<main class="wrap">
  <header class="no-print">
    <div class="kicker">MYSKME × 英语王老师</div>
    <h1>打印 <em>中心</em></h1>
    <p class="sub">选题库 → 选版式 → 打印 / 存 PDF · 课堂发卷</p>
    <div class="bar">
      <select id="bank"><option>加载题库中…</option></select>
      <button class="pbtn" id="btn-print">🖨 打印 / 存 PDF</button>
    </div>
    <div class="modes" id="modes"></div>
    <div class="hint" id="hint"></div>
  </header>
  <div id="sheet"><div class="msg no-print">请选择一个题库。</div></div>
  <footer class="no-print"><a href="../">← 作品总目</a>　·　<a href="../banks/">题库书架</a>　·　浏览器打印时可选「保存为 PDF」</footer>
</main>
<div class="ctrl no-print"><button id="themeBtn" title="切换主题">◐</button></div>
<script>
var SHELF='https://myskme.github.io/myskme-hub/banks/';
var $=function(s){return document.querySelector(s)};
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function blanks(s){return esc(s).replace(/___+/g,'<span class="blank">　　　</span>')}
var CAT=[],BANK=null,MODE='paper';
var MODES=[['paper','选择题卷'],['key','选择题·答案版 🔒'],['vocab','词表'],['dictation','词表·默写版']];
/* 答案+解析软门——题目免费，答案/解析需密码。明文口令不入源码(同 wall/maker/almanac 范式)。
   ⚠ 待办(2026-07-20)：当前 ANS_HASH 恰好 = sha256(作文墙班级口令)，而班级口令是印在
   学生海报上分发的 → 全班都能解锁教师答案版。请换一个只有你知道的口令：
       printf '%s' '新口令' | shasum -a 256
   把结果填进下面的 ANS_HASH 即可（前端软门，防君子不防小人，但至少不该和班级口令同一把）。 */
var ANS_HASH="6bc05fd48828cf625c1ee53fd231cb69ffc5fd736f940b496549d443ad56cea0";
function ansOK(){try{return sessionStorage.getItem('myskme-ans')==='1'}catch(e){return false}}
async function sha256(s){try{var b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(s));return Array.prototype.map.call(new Uint8Array(b),function(x){return x.toString(16).padStart(2,'0')}).join('')}catch(e){return ''}}
function renderLock(){
  $('#sheet').innerHTML='<div class="lock no-print"><div class="ic">🔒</div><h3>答案与解析已加密</h3>'
    +'<p>题目可自由查看、打印；<b>答案和解析</b>需要密码解锁。<br>兑换码请联系 <b>MYSKME · 英语王老师</b>。</p>'
    +'<input id="ansPw" type="password" placeholder="输入答案密码" autocomplete="off" spellcheck="false"><div class="err" id="ansErr"></div>'
    +'<button id="ansGo">解 锁 答 案</button></div>';
  var go=function(){sha256(($('#ansPw').value||'').trim()).then(function(h){if(h===ANS_HASH){try{sessionStorage.setItem('myskme-ans','1')}catch(e){}render()}else{$('#ansErr').textContent='密码不正确，请联系王老师'}})};
  $('#ansGo').addEventListener('click',go);
  $('#ansPw').addEventListener('keydown',function(e){if(e.key==='Enter')go()});
  $('#ansPw').focus();
}

function renderModes(){$('#modes').innerHTML=MODES.map(function(m){return '<button class="mode'+(m[0]===MODE?' on':'')+'" data-m="'+m[0]+'">'+m[1]+'</button>'}).join('')}
function mcqItems(b){return (b.mods&&b.mods.m4||[]).concat(b.mods&&b.mods.m5||[]).filter(function(it){return it&&it.ops&&it.ops.length>=2&&typeof it.ans==='number'})}
function pairItems(b){var a=[];['m1','m2','m3'].forEach(function(k){(b.mods&&b.mods[k]||[]).forEach(function(p){if(Array.isArray(p)&&p[0])a.push(p)})});return a}
var K=['A','B','C','D','E'];

function render(){
  var s=$('#sheet');
  if(!BANK){s.innerHTML='<div class="msg no-print">请选择一个题库。</div>';return}
  if(MODE==='key'&&!ansOK()){renderLock();return}
  var b=BANK,head='<h2>'+esc(b.name||b.code)+'</h2><div class="code">兑换码 '+esc(b.code)+' · MYSKME 题库工坊</div>';
  var html;
  if(MODE==='vocab'||MODE==='dictation'){
    var pairs=pairItems(b);
    if(!pairs.length){s.innerHTML='<div class="sheet">'+head+'<div class="msg">本题库没有配对词条（词表来自 m1–m3）。可换「选择题卷」。</div></div>';return}
    var dict=MODE==='dictation';
    head+='<div class="fields">班级：__________　姓名：__________　'+(dict?'得分：______':'日期：__________')+'</div>';
    html='<div class="part">'+(dict?'词汇默写（写出英文/中文）':'词汇表')+'（'+pairs.length+' 词）</div><table><tr><td class="no">#</td><td>'+(dict?'英文 / 提示':'英文')+'</td><td>'+(dict?'（默写）':'中文释义')+'</td></tr>';
    pairs.forEach(function(p,i){
      html+='<tr><td class="no">'+(i+1)+'</td><td>'+(dict?esc(p[0]):('<b>'+esc(p[0])+'</b>'))+'</td><td'+(dict?' class="wr"':'')+'>'+(dict?'':esc(p[1]))+'</td></tr>';
    });
    html+='</table>';
  } else {
    var items=mcqItems(b),withAns=(MODE==='key');
    if(!items.length){s.innerHTML='<div class="sheet">'+head+'<div class="msg">本题库没有选择题（选择题来自 m4/m5）。可换「词表」。</div></div>';return}
    head+='<div class="fields">班级：__________　姓名：__________　得分：______</div>';
    html='<div class="part">单项选择 / 阅读（共 '+items.length+' 题）'+(withAns?'　【教师答案版】':'')+'</div>';
    var lastP=null,n=0,keyList=[];
    items.forEach(function(it){
      if(it.passage){if(it.passage!==lastP){lastP=it.passage;html+='<div class="psg"><b>阅读短文 Passage</b><br>'+blanks(it.passage).replace(/\n/g,'<br>')+'</div>'}}else lastP=null;
      n++;
      html+='<div class="qq"><div class="st">'+n+'. '+blanks(it.q)+'</div><div class="ops">';
      it.ops.forEach(function(op,i){var mark=(withAns&&i===it.ans);html+='<div'+(mark?' class="ans"':'')+'>'+K[i]+'. '+esc(op)+(mark?' ✓':'')+'</div>'});
      html+='</div>';
      if(withAns&&it.why)html+='<div class="why">解析：'+esc(it.why)+'</div>';
      html+='</div>';
      keyList.push(K[it.ans]);
    });
    if(withAns)html+='<div class="part">答案速览</div><div style="font-family:var(--mono);letter-spacing:.1em;line-height:2">'+keyList.map(function(k,i){return (i+1)+'.'+k}).join('　')+'</div>';
  }
  s.innerHTML='<div class="sheet">'+head+html+'<div class="foot">MYSKME × 英语王老师 · myskme.github.io/myskme-hub/banks/ · 兑换码 '+esc(b.code)+' 可在词灵对决在线刷同款</div></div>';
}
function loadBank(code){
  $('#sheet').innerHTML='<div class="msg no-print">正在取题库……</div>';
  fetch(SHELF+code+'.json',{cache:'no-store'}).then(function(r){return r.json()}).then(function(b){BANK=b;render()}).catch(function(){$('#sheet').innerHTML='<div class="msg no-print">题库取不到，稍后再试。</div>'});
}
async function boot(){
  renderModes();
  try{
    CAT=((await (await fetch(SHELF+'index.json',{cache:'no-store'})).json()).catalog||[]);
    if(!CAT.length){$('#bank').innerHTML='<option>暂无题库</option>';return}
    $('#bank').innerHTML=CAT.map(function(c){return '<option value="'+esc(c.code)+'">'+esc(c.code)+' · '+esc(c.name)+'（'+(c.count||'?')+'题）</option>'}).join('');
    $('#hint').textContent='共 '+CAT.length+' 个题库可打印。选择题卷来自 m4/m5，词表来自 m1–m3 配对。';
    loadBank(CAT[0].code);
  }catch(e){$('#bank').innerHTML='<option>加载失败</option>'}
}
boot();
$('#bank').addEventListener('change',function(){loadBank(this.value)});
document.addEventListener('click',function(e){var m=e.target.closest('.mode');if(m){MODE=m.getAttribute('data-m');renderModes();render()}});
$('#btn-print').addEventListener('click',function(){window.print()});
(function(){var TLS='myskme-theme',order=['auto','light','dark'],name={auto:'跟随系统',light:'浅色',dark:'深色'},icon={auto:'◐',light:'☀',dark:'☾'},mq=window.matchMedia?matchMedia('(prefers-color-scheme: dark)'):null;
function pref(){try{return localStorage.getItem(TLS)||'auto'}catch(e){return 'auto'}}
function resolve(p){return p==='auto'?((mq&&mq.matches)?'dark':'light'):p}
function apply(p){var e=document.documentElement;e.setAttribute('data-theme',resolve(p));e.setAttribute('data-themepref',p);var b=$('#themeBtn');if(b){b.textContent=icon[p];b.title='主题：'+name[p]}}
var b=$('#themeBtn');if(b)b.addEventListener('click',function(){var nx=order[(order.indexOf(pref())+1)%order.length];try{localStorage.setItem(TLS,nx)}catch(e){}apply(nx)});
if(mq&&mq.addEventListener)mq.addEventListener('change',function(){if(pref()==='auto')apply('auto')});apply(pref());})();
</script>
</body>
</html>
