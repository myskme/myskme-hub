name: 题库工坊 · 自动构建书架
on:
  push:
    branches: [main]
    paths:
      - 'banks/src/**'
      - 'build_banks.py'
      - '.github/workflows/build-banks.yml'
permissions:
  contents: write
concurrency:
  group: build-banks
  cancel-in-progress: false
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: 由 banks/src/ 构建 banks/<code>.json + index.json
        run: python3 build_banks.py
      - name: 提交构建结果（若有变化）
        run: |
          git config user.name "MYSKME 题库工坊"
          git config user.email "274490646+myskme@users.noreply.github.com"
          git add -A banks/
          if git diff --cached --quiet; then
            echo "书架无变化，跳过提交。"
          else
            git commit -m "题库工坊：自动构建书架目录 [skip ci]"
            git push
          fi
