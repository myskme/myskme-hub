  function renderFilters(){
    var cats=['全部'].concat(grades());
    filtersEl.innerHTML=cats.map(function(c){return '<button class="chip'+(c===filter?' on':'')+'" data-f="'+esc(c)+'">'+esc(c)+'</button>';}).join('');
  }
  function cardHTML(e,i){
    return '<a class="card" data-i="'+i+'">'
      +(e.featured?'<span class="ribbon">金奖</span>':'')
      +(e.score?'<span class="score">'+esc(e.score)+'</span>':'')
      +'<img loading="lazy" alt="" src="'+esc(imgOf(e))+'">'
      +'<div class="cap"><div class="ct" data-bind="title" data-i="'+i+'">'+esc(e.title)+'</div>'
      +'<div class="cm"><span data-bind="author" data-i="'+i+'">'+esc(e.author)+'</span> · '+esc(e.date||'')+'</div>'
      +'<div class="hl">'+(e.tag?'<span class="tagchip">'+esc(e.tag)+'</span>':'')+(e.highlights||[]).slice(0,3).map(function(h){return '<span>'+esc(h)+'</span>';}).join('')+'</div></div>'
      +'<div class="card-admin"><button data-op="img" data-i="'+i+'">换图</button><button data-op="feat" data-i="'+i+'">★ 金奖</button><button data-op="edit" data-i="'+i+'">改</button><button data-op="del" data-i="'+i+'">删</button></div>'
      +'</a>';
  }
  function render(){
    var list=DATA.entries.map(function(e,i){return {e:e,i:i};}).filter(function(o){return filter==='全部'||o.e.grade===filter;});
    wallEl.innerHTML=list.map(function(o){return cardHTML(o.e,o.i);}).join('');
    emptyEl.style.display=list.length?'none':'block';
    var sub=document.querySelector('[data-h="subtitle"]'); if(sub)sub.textContent=DATA.subtitle||'';
    applyAdmin();
  }
  function applyAdmin(){
    var on=isAdmin();
    document.querySelectorAll('[data-bind],[data-h]').forEach(function(el){
      if(on){el.setAttribute('contenteditable','true');el.setAttribute('spellcheck','false');}else el.removeAttribute('contenteditable');
    });
  }

  // lightbox
  var lb=document.getElementById('lb'), lbBox=document.getElementById('lbBox');
  function openLB(i){
    var e=DATA.entries[i];if(!e)return;
    lbBox.innerHTML='<div class="lb-img"><img src="'+esc(imgOf(e))+'" alt=""></div>'
      +'<div class="lb-info"><h3>'+esc(e.title)+(e.score?' <span style="color:var(--gold);font-size:18px">'+esc(e.score)+'</span>':'')+'</h3>'
      +'<div class="lb-meta">'+esc(e.author||'')+' · '+esc(e.grade||'')+' · '+esc(e.theme||'')+' · '+esc(e.date||'')+'</div>'
      +(e.note?'<div class="lb-note"><b>王老师点评 · </b>'+esc(e.note)+'</div>':'')
      +'<div class="lb-hl">'+(e.tag?'<span class="tagchip">'+esc(e.tag)+'</span>':'')+(e.highlights||[]).map(function(h){return '<span>'+esc(h)+'</span>';}).join('')+'</div></div>';
    lb.classList.add('show');
  }
  document.getElementById('lbClose').onclick=function(){lb.classList.remove('show');};
  lb.addEventListener('click',function(ev){if(ev.target===lb)lb.classList.remove('show');});

  // events
  filtersEl.addEventListener('click',function(ev){var b=ev.target.closest('[data-f]');if(b){filter=b.getAttribute('data-f');renderFilters();render();}});
  wallEl.addEventListener('click',function(ev){
    var op=ev.target.closest('[data-op]');
    if(op){ev.preventDefault();var i=+op.getAttribute('data-i');doOp(op.getAttribute('data-op'),i);return;}
    if(isAdmin()){ ev.preventDefault(); return; }   // 编辑模式：点卡片一律不弹灯箱（含图片/角标/评分）
    var card=ev.target.closest('.card'); if(card)openLB(+card.getAttribute('data-i'));
  });
  wallEl.addEventListener('input',function(ev){
    var el=ev.target, key=el.getAttribute('data-bind'); if(!key)return;
    var i=+el.getAttribute('data-i'); if(DATA.entries[i]){DATA.entries[i][key]=el.textContent;save();}
  });
  document.querySelector('[data-h="subtitle"]').addEventListener('input',function(ev){DATA.subtitle=ev.target.textContent;save();});

  function doOp(op,i){
    var e=DATA.entries[i]; if(!e)return;
    if(op==='feat'){e.featured=!e.featured;}
    else if(op==='del'){if(!confirm('从墙上撤下「'+(e.title||'')+'」？'))return;DATA.entries.splice(i,1);}
    else if(op==='edit'){editMeta(i);return;}
    else if(op==='img'){pickImageFor(i);return;}
    save();render();
  }
  function editMeta(i){
    var e=DATA.entries[i];
    var note=prompt('王老师点评：',e.note||''); if(note!==null)e.note=note;
    var hl=prompt('高分亮点（逗号分隔）：',(e.highlights||[]).join('，')); if(hl!==null)e.highlights=hl.split(/[，,]/).map(function(s){return s.trim();}).filter(Boolean);
    var sc=prompt('评级（如 A+ / 留空不显示）：',e.score||''); if(sc!==null)e.score=sc.trim();
    var th=prompt('主题：',e.theme||''); if(th!==null)e.theme=th.trim();
    save();render();
  }

  // add with image pick + downscale
  var imgTargetIdx=null, fileIn=document.getElementById('fileIn');
  function pickImageFor(i){imgTargetIdx=i;fileIn.value='';fileIn.click();}
  document.getElementById('aAdd').onclick=function(){imgTargetIdx=null;fileIn.value='';fileIn.click();};
  fileIn.onchange=function(){
    var f=fileIn.files&&fileIn.files[0]; if(!f)return;
    var fr=new FileReader();
    fr.onload=function(){
      var im=new Image();
      im.onload=function(){
        var max=1000, sc=Math.min(1,max/im.width), w=Math.round(im.width*sc), h=Math.round(im.height*sc);
        var cv=document.createElement('canvas');cv.width=w;cv.height=h;cv.getContext('2d').drawImage(im,0,0,w,h);
        var data=cv.toDataURL('image/jpeg',0.82);
        if(imgTargetIdx!=null && DATA.entries[imgTargetIdx]){DATA.entries[imgTargetIdx].img=data;save();render();toast('已换图');}
        else{
          var gr=prompt('年级（初一/初二/初三）：','初二')||'';
          var ti=prompt('作文题目：','')||'未命名';
          var au=prompt('作者（建议化名/学号/首字母）：','')||'';
          DATA.entries.unshift({id:'w'+Date.now(),title:ti,author:au,grade:gr.trim(),theme:'',date:new Date().toISOString().slice(0,7),score:'',note:'',highlights:[],featured:false,img:data});
          save();renderFilters();render();toast('已加入展示墙');
        }
      };
      im.src=fr.result;
    };
    fr.readAsDataURL(f);
  };

  // gate
  var gate=document.getElementById('gate');
  function checkGate(){
    if(!DATA.gate){gate.classList.remove('show');return;}
    if(sessionStorage.getItem('wall-gate-ok')==='1'){gate.classList.remove('show');return;}
    gate.classList.add('show');
  }
  document.getElementById('gateOk').onclick=function(){
    if(document.getElementById('gateIn').value.trim()===DATA.gate){sessionStorage.setItem('wall-gate-ok','1');gate.classList.remove('show');}
    else toast('口令不对');
  };
  document.getElementById('gateIn').addEventListener('keydown',function(e){if(e.key==='Enter')document.getElementById('gateOk').click();});

  // admin
  var mask=document.getElementById('mask'), pwIn=document.getElementById('pwIn');
  document.getElementById('fab').onclick=function(){mask.classList.add('show');pwIn.value='';setTimeout(function(){pwIn.focus();},50);};
  document.getElementById('pwCancel').onclick=function(){mask.classList.remove('show');};
  document.getElementById('pwOk').onclick=tryPw;
  pwIn.addEventListener('keydown',function(e){if(e.key==='Enter')tryPw();if(e.key==='Escape')mask.classList.remove('show');});
  function tryPw(){if(pwIn.value===PW){mask.classList.remove('show');document.body.classList.add('admin');sessionStorage.setItem(SS,'1');applyAdmin();toast('已进入管理员');}else{pwIn.select();toast('密码错误');}}
  document.getElementById('aExit').onclick=function(){document.body.classList.remove('admin');sessionStorage.removeItem(SS);applyAdmin();toast('已退出');};
  document.getElementById('aReload').onclick=function(){if(!confirm('丢弃本机所有未导出的改动，重新载入线上最新内容？'))return;try{localStorage.removeItem(LS);}catch(e){}location.reload();};
  document.getElementById('aGate').onclick=function(){var g=prompt('设置班级口令（留空=公开，无门槛）：',DATA.gate||'');if(g!==null){DATA.gate=g.trim();save();toast(DATA.gate?'已设口令：'+DATA.gate:'已设为公开');}};
  document.getElementById('aExport').onclick=function(){
    save();var jsonStr=JSON.stringify(DATA,null,2);
    fetch(location.pathname+location.search,{cache:'no-store'}).then(function(r){return r.text();}).then(function(html){
      if(html.indexOf('/*WALLDATA_START*/')<0)throw 0;
      html=html.replace(/\/\*WALLDATA_START\*\/[\s\S]*?\/\*WALLDATA_END\*\//,'/*WALLDATA_START*/\nvar DEFAULT_WALL = '+jsonStr+';\n/*WALLDATA_END*/');
      var b=new Blob([html],{type:'text/html;charset=utf-8'}),a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='index.html';document.body.appendChild(a);a.click();a.remove();
      toast('已导出 index.html，重新部署即更新');
    }).catch(function(){
      var b=new Blob([jsonStr],{type:'application/json'}),a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='wall-index.json';document.body.appendChild(a);a.click();a.remove();
      toast('已导出 JSON');
    });
  };

  // ---- 作文墙海报（浅色 + 范文 hero + 墙二维码）----
  function buildWallPoster(){
    var srcs=['wall-qr.png','img/w-lin.jpg'],imgs={},got=0,done=false;
    function fin(){if(done)return;done=true;drawWallPoster(imgs['wall-qr.png'],imgs['img/w-lin.jpg']);}
    srcs.forEach(function(s){var im=new Image();im.onload=function(){imgs[s]=im;if(++got===srcs.length)fin();};im.onerror=function(){if(++got===srcs.length)fin();};im.src=s+'?cb='+Date.now();});
    setTimeout(fin,4500);
  }
  function drawWallPoster(qr,hero){
    var W=1080,H=1920,cv=document.createElement('canvas');cv.width=W;cv.height=H;var x=cv.getContext('2d');
    x.fillStyle='#f5efe2';x.fillRect(0,0,W,H);
    var g=x.createRadialGradient(W/2,-60,80,W/2,260,940);g.addColorStop(0,'rgba(201,166,74,.16)');g.addColorStop(1,'rgba(201,166,74,0)');x.fillStyle=g;x.fillRect(0,0,W,680);
    x.strokeStyle='rgba(150,120,50,.55)';x.lineWidth=2;x.strokeRect(30,30,W-60,H-60);
    x.textAlign='center';x.textBaseline='alphabetic';
    x.fillStyle='#8a6d1e';x.font='600 26px "Songti SC",serif';x.fillText('MYSKME × 英语王老师',W/2,118);
    x.fillStyle='#2a2218';x.font='300 64px "Songti SC",serif';x.fillText('荣誉殿堂 · 优秀作文墙',W/2,202);
    x.fillStyle='#6a5f47';x.font='400 26px "Songti SC",serif';x.fillText('学院谷地 · 手写真迹展示',W/2,250);
    var hy=300;
    if(hero){
      var hw=Math.min(940,W-120),hh=hero.height*(hw/hero.width),hx;
      if(hh>760){hh=760;hw=hero.width*(hh/hero.height);}
      hx=(W-hw)/2;
      x.fillStyle='#fffdf6';x.fillRect(hx-10,hy-10,hw+20,hh+20);
      x.drawImage(hero,hx,hy,hw,hh);
      x.strokeStyle='rgba(150,120,50,.6)';x.lineWidth=2;x.strokeRect(hx-10,hy-10,hw+20,hh+20);
      x.fillStyle='#8a6d1e';x.font='600 26px "Songti SC",serif';x.fillText('满分范文 · 金奖',W/2,hy+hh+56);
      hy=hy+hh+96;
    } else { hy=620; }
    var fy=Math.max(hy,1180);
    x.strokeStyle='rgba(150,120,50,.4)';x.lineWidth=1;x.beginPath();x.moveTo(60,fy);x.lineTo(W-60,fy);x.stroke();
    var qs=200,qx=(W-qs)/2,qy=fy+34;
    if(qr){x.strokeStyle='rgba(150,120,50,.6)';x.lineWidth=2;x.strokeRect(qx-6,qy-6,qs+12,qs+12);x.drawImage(qr,qx,qy,qs,qs);}
    x.textAlign='center';x.fillStyle='#8a6d1e';x.font='600 30px "Songti SC",serif';x.fillText('扫码看全部优秀范文',W/2,qy+qs+46);
    x.fillStyle='#5a4f38';x.font='400 21px ui-monospace,Menlo,monospace';x.fillText('myskme.github.io/myskme-hub/wall',W/2,qy+qs+82);
    if(DATA&&DATA.gate){x.fillStyle='#6a5f47';x.font='400 22px "Songti SC",serif';x.fillText('班级口令：'+DATA.gate,W/2,qy+qs+120);}
    x.fillStyle='#8a6d1e';x.font='600 21px serif';x.fillText('MYSKME — Make Yourself Special & Kind',W/2,H-46);
    cv.toBlob(function(blob){if(!blob){toast('海报导出失败');return;}
      var u=URL.createObjectURL(blob),a=document.createElement('a');a.href=u;a.download='MYSKME-优秀作文墙-海报.png';
      document.body.appendChild(a);a.click();a.remove();setTimeout(function(){URL.revokeObjectURL(u);},3000);toast('已导出作文墙海报');},'image/png');
  }
  var wpb=document.getElementById('wPosterBtn');if(wpb)wpb.addEventListener('click',buildWallPoster);

  // boot
  fetch('index.json',{cache:'no-store'}).then(function(r){return r.ok?r.json():null;}).then(function(j){
    if(j&&j.entries&&!localStorage.getItem(LS)){DATA=j;}
  }).catch(function(){}).finally(function(){
    renderFilters();render();checkGate();
    if(sessionStorage.getItem(SS)==='1'){document.body.classList.add('admin');applyAdmin();}
  });
})();
</script>
</body>
</html>
