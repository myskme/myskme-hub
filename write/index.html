<!doctype html>
<html lang="zh-CN" data-theme="dark" data-themepref="auto">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<script>(function(){try{var p=localStorage.getItem('myskme-theme')||'auto';var d=p==='auto'?(matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light'):p;var e=document.documentElement;e.setAttribute('data-theme',d);e.setAttribute('data-themepref',p)}catch(e){}})();</script>
<title>作文训练场 · MYSKME × 英语王老师</title>
<meta name="description" content="MYSKME · 中考英语作文训练场：题目 + 句型支架 + 高级表达 + 实时自检（字数/连接词/时态/清单）。纯网页，离线可用。">
<meta property="og:type" content="website">
<meta property="og:title" content="作文训练场 · MYSKME 英语王老师">
<meta property="og:description" content="题目 + 句型支架 + 高级表达 + 实时自检。中考英语写作，边写边查。">
<meta property="og:image" content="https://myskme.github.io/myskme-hub/og-cover.png">
<meta property="og:url" content="https://myskme.github.io/myskme-hub/write/">
<style>
:root{
  --bg:#0a0a0c;--bg2:#111114;--bg3:#16161a;--bg4:#1c1c22;
  --ink:#f0e6d2;--ink2:#a8a090;--ink3:#6a6458;--ink4:#3a382f;
  --gold:#c9a64a;--gold2:#e8c768;--gold3:#7a6320;
  --green:#6aa86a;--red:#d56060;--blue:#5a8ec8;
  --line:rgba(201,166,74,.22);--line2:rgba(201,166,74,.09);--glow:0 0 24px rgba(201,166,74,.4);
  --serif:"Noto Serif SC","Source Han Serif SC","Songti SC","STSong",serif;
  --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
}
:root[data-theme="light"]{
  --bg:#ece2cc;--bg2:#e4d8bc;--bg3:#f8f2e4;--bg4:#e0d3b3;
  --ink:#2a2218;--ink2:#574b37;--ink3:#635943;--ink4:#b6a988;
  --gold:#6f5410;--gold2:#5f470e;--gold3:#b89a52;
  --green:#2f6a3e;--red:#9a271d;--blue:#33548c;
  --line:rgba(120,90,20,.30);--line2:rgba(120,90,20,.13);--glow:0 4px 16px rgba(120,90,20,.18);
}
*{box-sizing:border-box}
body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--serif);line-height:1.7;
  background-image:radial-gradient(1100px 640px at 50% -8%,rgba(201,166,74,.10),transparent 60%);background-attachment:fixed;
  transition:background-color .35s,color .35s}
:root[data-theme="light"] body{background-image:radial-gradient(1100px 640px at 50% -8%,rgba(190,160,80,.18),transparent 60%)}
.wrap{max-width:1060px;margin:0 auto;padding:clamp(28px,5vw,56px) clamp(14px,4vw,36px) 90px}
header{text-align:center;margin-bottom:26px}
.kicker{font-size:12px;letter-spacing:.4em;color:var(--gold);text-transform:uppercase}
h1{font-size:clamp(28px,5vw,46px);font-weight:300;letter-spacing:.14em;margin:.3em 0 .12em}
h1 em{font-style:normal;color:var(--gold);font-weight:500;text-shadow:var(--glow)}
.sub{color:var(--ink2);letter-spacing:.08em;font-size:14px;margin:0}
.genres{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin:22px 0 8px}
.g-tab{font-family:var(--serif);font-size:13.5px;letter-spacing:.06em;padding:9px 18px;cursor:pointer;color:var(--ink2);
  border:1px solid var(--line);background:transparent;transition:all .2s;border-radius:2px}
.g-tab.on{color:var(--gold2);border-color:var(--gold3);background:rgba(201,166,74,.08)}
.grid{display:grid;grid-template-columns:1fr;gap:18px;margin-top:20px}
@media(min-width:860px){.grid{grid-template-columns:1.15fr .85fr}}
.card{background:linear-gradient(160deg,var(--bg3),var(--bg2));border:1px solid var(--line);padding:20px 22px}
:root[data-theme="light"] .card{background:linear-gradient(160deg,var(--bg3),#f1e9d6)}
.eyebrow{font-size:11px;letter-spacing:.3em;color:var(--gold);text-transform:uppercase;margin:0 0 8px}
.prompt-en{font-size:17px;line-height:1.7;margin:0 0 6px}
.prompt-cn{color:var(--ink2);font-size:13.5px;margin:0 0 12px}
.req{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.req span{font-size:11.5px;color:var(--ink3);border:1px solid var(--line2);padding:3px 9px;border-radius:999px}
.req span b{color:var(--gold);font-weight:500}
.pts{margin:0 0 4px;padding-left:20px;color:var(--ink2);font-size:13.5px}
.pts li{margin:3px 0}
.chips{display:flex;gap:7px;flex-wrap:wrap;margin:6px 0 2px}
.chip{font-family:var(--mono);font-size:12.5px;color:var(--ink);border:1px dashed var(--line);background:var(--bg);
  padding:5px 10px;cursor:pointer;border-radius:3px;transition:all .18s}
.chip:hover{border-color:var(--gold);color:var(--gold2);border-style:solid}
.chip.up{border-color:color-mix(in srgb,var(--blue) 45%,transparent);color:var(--blue)}
textarea{width:100%;min-height:300px;resize:vertical;background:var(--bg);color:var(--ink);border:1px solid var(--line);
  font-family:var(--serif);font-size:16px;line-height:1.9;padding:16px 18px;outline:none;letter-spacing:.01em}
textarea:focus{border-color:var(--gold);box-shadow:var(--glow)}
.tools{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.btn{font-family:var(--serif);font-size:13px;letter-spacing:.05em;padding:8px 15px;border:1px solid var(--line);
  background:transparent;color:var(--ink);cursor:pointer;border-radius:2px;transition:all .2s}
.btn:hover{border-color:var(--gold);color:var(--gold2)}
.btn.danger:hover{border-color:var(--red);color:var(--red)}
.stat-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}
.stat{flex:1;min-width:92px;background:var(--bg);border:1px solid var(--line2);padding:10px 12px;text-align:center}
.stat b{display:block;font-size:22px;color:var(--gold2);font-weight:500;line-height:1.1;font-family:var(--mono)}
.stat b.ok{color:var(--green)}.stat b.low{color:var(--ink3)}
.stat span{font-size:11px;color:var(--ink3);letter-spacing:.08em}
.check{margin:0;padding:0;list-style:none}
.check li{display:flex;align-items:flex-start;gap:9px;padding:7px 0;font-size:14px;border-top:1px solid var(--line2)}
.check li:first-child{border-top:0}
.check .mk{flex:0 0 20px;height:20px;border:1px solid var(--line);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:13px;cursor:pointer;color:transparent;margin-top:1px}
.check li.done .mk{background:var(--green);border-color:var(--green);color:#fff}
.check li.auto .mk{cursor:default}
.check li.done.auto .mk{background:var(--gold);border-color:var(--gold)}
.check .tx{flex:1}
.check .tx small{display:block;color:var(--ink3);font-size:12px}
.found{margin-top:6px;font-size:12.5px;color:var(--ink3);line-height:1.9}
.found b{color:var(--green);font-weight:500;font-family:var(--mono)}
.tip{font-size:12.5px;color:var(--ink3);margin-top:8px;line-height:1.6}
.tip b{color:var(--gold)}
footer{margin-top:44px;padding-top:22px;border-top:1px solid var(--line2);text-align:center;color:var(--ink3);font-size:13px;letter-spacing:.08em}
footer a{color:var(--gold2);text-decoration:none}
.ctrl{position:fixed;right:16px;bottom:16px;z-index:40;display:flex;gap:8px;background:linear-gradient(180deg,#15110a,rgba(20,16,10,.97));
  border:1px solid var(--line);border-radius:999px;padding:6px;box-shadow:0 6px 20px rgba(0,0,0,.35)}
:root[data-theme="light"] .ctrl{background:linear-gradient(180deg,#f2e8d2,rgba(242,232,210,.97))}
.ctrl button{width:40px;height:40px;border-radius:50%;border:1px solid transparent;background:transparent;color:var(--ink);
  font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .25s}
.ctrl button:hover{border-color:var(--gold);color:var(--gold2)}
#toast{position:fixed;left:50%;bottom:84px;transform:translateX(-50%) translateY(16px);z-index:60;background:var(--bg4);
  border:1px solid var(--gold3);color:var(--ink);padding:10px 18px;font-size:13px;opacity:0;pointer-events:none;transition:all .3s;border-radius:3px}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media print{.ctrl,.genres,.tools,.g-hint{display:none}.grid{grid-template-columns:1fr}textarea{border:0;min-height:0}}
</style>
</head>
<body>
<main class="wrap">
  <header>
    <div class="kicker">MYSKME × 英语王老师</div>
    <h1>作文 <em>训练场</em></h1>
    <p class="sub">选题 → 看句型支架 → 动笔 → 右侧实时自检（字数 · 连接词 · 时态 · 清单）</p>
    <div class="genres" id="genres"></div>
  </header>
  <div class="grid">
    <div>
      <div class="card" id="brief"></div>
      <div style="margin-top:14px">
        <textarea id="essay" placeholder="在这里写你的作文…（点上方句型支架可一键插入；内容自动存本机，换天回来还在）"></textarea>
        <div class="tools">
          <button class="btn" id="btn-copy">复制草稿</button>
          <button class="btn" id="btn-print">打印 / 存 PDF</button>
          <button class="btn danger" id="btn-clear">清空</button>
        </div>
      </div>
    </div>
    <div>
      <div class="card">
        <div class="eyebrow">实时自检 · Live check</div>
        <div class="stat-row">
          <div class="stat"><b id="s-words">0</b><span id="s-words-lbl">词</span></div>
          <div class="stat"><b id="s-conn">0</b><span>连接词</span></div>
          <div class="stat"><b id="s-up">0</b><span>高级表达</span></div>
        </div>
        <ul class="check" id="check"></ul>
        <div class="found" id="found-conn"></div>
        <div class="tip" id="tense-tip"></div>
      </div>
    </div>
  </div>
  <footer>
    <a href="../">← 作品总目</a>　·　<a href="../wall/">优秀作文墙 →</a>　·　MYSKME 作文训练场 · 内容存本机、离线可用
  </footer>
</main>
<div class="ctrl"><button id="themeBtn" title="切换主题">◐</button></div>
<div id="toast"></div>
<script>
var GENRES=[
  {key:"letter",name:"建议信",en:"Advice Letter",
   prompt:"Your pen friend Peter is having trouble learning Chinese. Write him a letter (about 80–100 words) with some advice.",
   cn:"笔友 Peter 学中文遇到困难，写信给他，给出 2–3 条建议并鼓励他。",
   min:80,max:110,tense:"一般现在时 + 情态动词（should / can / had better）为主。",
   points:["问候 + 点明写信目的","给 2–3 条具体建议（First… / What's more… / Last but not least…）","每条建议加一句原因或例子","鼓励 + 结尾落款（Yours, Li Hua）"],
   frames:["Dear Peter,","I'm glad to hear from you.","Here is some advice for you.","First of all, you'd better …","What's more, it helps to …","Last but not least, don't be afraid to …","I'm sure you will make progress.","Yours,\nLi Hua"],
   up:["you'd better …","it's a good idea to …","practise … every day","keep a diary in Chinese","don't give up"]},
  {key:"story",name:"记叙文",en:"Narrative",
   prompt:"Write about an unforgettable experience (about 90–110 words): what happened and how you felt.",
   cn:"写一件难忘的事：起因、经过、结果和你的感受。",
   min:90,max:120,tense:"一般过去时为主（was/were, did），感受可用一般现在时。",
   points:["交代时间、地点、人物","起因 → 经过（用 then / after that 串起来）","高潮 / 转折","结果 + 你的感受与收获"],
   frames:["It was a … day.","At first, …","Then, to my surprise, …","After that, …","In the end, …","I will never forget that day.","From then on, I learned that …"],
   up:["to my surprise","little by little","couldn't help …ing","made up my mind to …","it was really … that …"]},
  {key:"opinion",name:"观点议论",en:"Opinion",
   prompt:"Some students think keeping pets is good, while others don't. What's your opinion? (about 90–110 words)",
   cn:"就某话题（如养宠物 / 手机 / 网课）给出你的看法，说明理由。",
   min:90,max:120,tense:"一般现在时为主。",
   points:["引出话题（有人…有人…）","一方观点 + 理由","另一方观点 + 理由（On the other hand…）","亮出并总结你的看法（In my opinion… / All in all…）"],
   frames:["Different people have different ideas about …","Some people think that …","On one hand, …","On the other hand, …","As for me, I believe …","In my opinion, …","All in all, …"],
   up:["there is no doubt that …","what matters most is …","not only … but also …","play an important role in …","every coin has two sides"]},
  {key:"intro",name:"应用文·介绍",en:"Introduction / Notice",
   prompt:"Introduce your school (or a school activity) to a foreign friend. (about 80–100 words)",
   cn:"向外国朋友介绍你的学校或一次活动：概况 + 细节 + 邀请。",
   min:80,max:110,tense:"一般现在时为主；讲经历时用过去时。",
   points:["概况（名字 / 位置 / 规模）","2–3 个具体细节（There are… / Every year we…）","一个亮点 / 你最喜欢的地方","欢迎 / 邀请对方（Welcome to…）"],
   frames:["Let me introduce … to you.","Our school lies in …","There are … in our school.","Every year we …","What I like best is …","Welcome to our school!"],
   up:["is well known for …","a great place to …","not only … but also …","play an important part in …","feel at home"]},
];
var CONNECTORS=["first of all","first","second","third","then","next","after that","finally","in the end","last but not least",
  "however","but","because","so","and","also","what's more","besides","for example","for instance","on one hand","on the other hand",
  "in my opinion","as for me","all in all","in a word","by the way"];
var $=function(s){return document.querySelector(s)};
var LS='myskme-write';
var state={g:0, drafts:{}};
try{var sv=JSON.parse(localStorage.getItem(LS)||'{}');if(sv.drafts)state.drafts=sv.drafts;if(sv.g)state.g=sv.g;}catch(e){}
function persist(){try{localStorage.setItem(LS,JSON.stringify(state))}catch(e){}}
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function toast(m){var t=$('#toast');t.textContent=m;t.classList.add('show');clearTimeout(toast._t);toast._t=setTimeout(function(){t.classList.remove('show')},1700)}

function renderGenres(){
  $('#genres').innerHTML=GENRES.map(function(g,i){return '<button class="g-tab'+(i===state.g?' on':'')+'" data-i="'+i+'">'+esc(g.name)+'</button>'}).join('');
}
function renderBrief(){
  var g=GENRES[state.g];
  var frames=g.frames.map(function(f){return '<span class="chip" data-ins="'+esc(f)+'">'+esc(f.replace(/\n/g,' ↵ '))+'</span>'}).join('');
  var ups=g.up.map(function(f){return '<span class="chip up" data-ins="'+esc(f)+'">'+esc(f)+'</span>'}).join('');
  $('#brief').innerHTML=
    '<div class="eyebrow">题目 · '+esc(g.en)+'</div>'
    +'<p class="prompt-en">'+esc(g.prompt)+'</p>'
    +'<p class="prompt-cn">'+esc(g.cn)+'</p>'
    +'<div class="req"><span>建议词数 <b>'+g.min+'–'+g.max+'</b></span><span>时态：<b>'+esc(g.tense.split('，')[0].split('（')[0])+'</b></span></div>'
    +'<div class="eyebrow" style="margin-top:6px">要点 · Cover these</div>'
    +'<ul class="pts">'+g.points.map(function(p){return '<li>'+esc(p)+'</li>'}).join('')+'</ul>'
    +'<div class="eyebrow" style="margin-top:12px">句型支架 · 点击插入</div><div class="chips">'+frames+'</div>'
    +'<div class="eyebrow" style="margin-top:10px">高级表达 · 加分句</div><div class="chips">'+ups+'</div>';
  $('#tense-tip').innerHTML='<b>时态提醒：</b>'+esc(g.tense);
}
function wordCount(t){var m=t.trim().match(/[A-Za-z][A-Za-z'’-]*/g);return m?m.length:0}
function analyze(){
  var g=GENRES[state.g], t=$('#essay').value, low=t.toLowerCase();
  var wc=wordCount(t);
  var foundC=CONNECTORS.filter(function(c){return low.indexOf(c)>=0});
  // 去重：first of all 命中时不再单独计 first（粗略）
  var foundUp=g.up.filter(function(u){return low.indexOf(u.toLowerCase().replace(/…/g,'').trim().split(' ').slice(0,3).join(' '))>=0 && u.replace(/…/g,'').trim().length>3});
  // stats
  var sw=$('#s-words');sw.textContent=wc;sw.className=(wc>=g.min?(wc<=g.max+15?'ok':''):'low');
  $('#s-words-lbl').textContent='词 (目标'+g.min+'+)';
  var sc=$('#s-conn');sc.textContent=foundC.length;sc.className=foundC.length>=3?'ok':'low';
  var su=$('#s-up');su.textContent=foundUp.length;su.className=foundUp.length>=1?'ok':'low';
  $('#found-conn').innerHTML=foundC.length?('已用连接词：'+foundC.slice(0,12).map(function(c){return '<b>'+esc(c)+'</b>'}).join('、')):'还没用连接词——试试 First… / What\'s more… / However…';
  // checklist (auto)
  var checks=[
    {k:'len',auto:true,done:wc>=g.min,tx:'字数达标（≥'+g.min+' 词）',sub:'当前 '+wc+' 词'},
    {k:'conn',auto:true,done:foundC.length>=3,tx:'用了 3+ 个连接词',sub:'当前 '+foundC.length+' 个'},
    {k:'up',auto:true,done:foundUp.length>=1,tx:'用了至少 1 个高级表达',sub:'当前 '+foundUp.length+' 个'},
    {k:'open',auto:false,done:!!state.drafts['ck_'+g.key+'_open'],tx:'有清晰的开头和结尾'},
    {k:'points',auto:false,done:!!state.drafts['ck_'+g.key+'_points'],tx:'覆盖了全部要点'},
    {k:'read',auto:false,done:!!state.drafts['ck_'+g.key+'_read'],tx:'读了一遍、检查了时态和拼写'},
  ];
  $('#check').innerHTML=checks.map(function(c){
    return '<li class="'+(c.done?'done ':'')+(c.auto?'auto':'')+'" data-ck="'+c.k+'"><span class="mk">✓</span>'
      +'<span class="tx">'+esc(c.tx)+(c.sub?'<small>'+esc(c.sub)+'</small>':'')+'</span></li>';
  }).join('');
}
function load(){var g=GENRES[state.g];$('#essay').value=state.drafts[g.key]||'';analyze();}

renderGenres();renderBrief();load();
document.addEventListener('click',function(e){
  var gt=e.target.closest('.g-tab');
  if(gt){state.g=+gt.getAttribute('data-i');persist();renderGenres();renderBrief();load();return;}
  var chip=e.target.closest('.chip[data-ins]');
  if(chip){var ta=$('#essay'),ins=chip.getAttribute('data-ins');
    var v=ta.value,p=ta.selectionStart||v.length;
    var sep=(v && !/\s$/.test(v.slice(0,p)))?' ':'';
    ta.value=v.slice(0,p)+sep+ins+' '+v.slice(p);
    ta.focus();var g=GENRES[state.g];state.drafts[g.key]=ta.value;persist();analyze();return;}
  var li=e.target.closest('.check li:not(.auto)');
  if(li){var g=GENRES[state.g],key='ck_'+g.key+'_'+li.getAttribute('data-ck');state.drafts[key]=!state.drafts[key];persist();analyze();return;}
});
$('#essay').addEventListener('input',function(){var g=GENRES[state.g];state.drafts[g.key]=$('#essay').value;persist();analyze();});
$('#btn-copy').addEventListener('click',function(){var t=$('#essay').value;if(!t.trim()){toast('还没写内容');return;}
  if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(t).then(function(){toast('已复制草稿')},function(){toast('复制失败')})}else toast('请手动选中复制');});
$('#btn-print').addEventListener('click',function(){window.print()});
$('#btn-clear').addEventListener('click',function(){if(!confirm('清空当前这篇草稿？'))return;var g=GENRES[state.g];state.drafts[g.key]='';persist();$('#essay').value='';analyze();toast('已清空');});
// 主题
(function(){var TLS='myskme-theme',order=['auto','light','dark'],name={auto:'跟随系统',light:'浅色',dark:'深色'},icon={auto:'◐',light:'☀',dark:'☾'},mq=window.matchMedia?matchMedia('(prefers-color-scheme: dark)'):null;
function pref(){try{return localStorage.getItem(TLS)||'auto'}catch(e){return 'auto'}}
function resolve(p){return p==='auto'?((mq&&mq.matches)?'dark':'light'):p}
function apply(p){var e=document.documentElement;e.setAttribute('data-theme',resolve(p));e.setAttribute('data-themepref',p);var b=$('#themeBtn');if(b){b.textContent=icon[p];b.title='主题：'+name[p]}}
var b=$('#themeBtn');if(b)b.addEventListener('click',function(){var nx=order[(order.indexOf(pref())+1)%order.length];try{localStorage.setItem(TLS,nx)}catch(e){}apply(nx)});
if(mq&&mq.addEventListener)mq.addEventListener('change',function(){if(pref()==='auto')apply('auto')});apply(pref());})();
</script>
</body>
</html>
